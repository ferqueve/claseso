<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO · Clase 4 — C Mínimo &amp; Modo Protegido</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f;
  --bg-1:#0d131b;
  --bg-2:#121a24;
  --panel-border:#1f2b38;
  --green:#39ff88;
  --green-dim:#1f8a52;
  --amber:#ffb454;
  --cyan:#5ccfe6;
  --blue:#4ea1ff;
  --blue-dim:#1f5aa8;
  --red:#ff5c7a;
  --text:#dbe4ea;
  --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse at top left, rgba(78,161,255,0.06), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text);
  font-family:var(--display);
  overflow:hidden;
  height:100vh;
}
::selection{ background:var(--blue); color:#04101f; }

.crt-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:500;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.statusbar{
  position:fixed; top:0; left:0; right:0; height:42px; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75));
  border-bottom:1px solid var(--panel-border);
  font-family:var(--mono); font-size:12.5px; letter-spacing:.03em;
  color:var(--text-dim);
}
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--blue); box-shadow:0 0 6px var(--blue); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#module-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid currentColor; }
.mod-teoria{ color:var(--cyan); }
.mod-practica{ color:var(--amber); }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--blue-dim), var(--blue)); box-shadow:0 0 8px var(--blue); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--blue); display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--blue); }
.accent-amber{ color:var(--amber); }
.accent-cyan{ color:var(--cyan); }
.accent-green{ color:var(--green); }
.accent-red{ color:var(--red); }

.panel{
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative;
}
.panel::before{
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(78,161,255,.4), transparent);
}
.term-tag{
  font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px;
  background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px;
}

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#2a5a8a; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.mega{ font-size:3.4rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--blue); }

.mod-hero{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
.mod-num{ font-family:var(--mono); font-size:5rem; font-weight:700; opacity:.18; position:absolute; right:70px; top:90px; }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }
ul.checklist.no li::before{ content:'\f00d'; color:var(--red); }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; transition:transform .2s, border-color .2s; }
.card-min:hover{ transform:translateY(-3px); border-color:var(--blue-dim); }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

table.cmp{ width:100%; border-collapse:collapse; font-size:.9rem; }
table.cmp th{ font-family:var(--mono); text-transform:uppercase; font-size:.72rem; letter-spacing:.05em; color:var(--text-dim); border-bottom:1px solid var(--panel-border); padding:8px 10px; text-align:left; }
table.cmp td{ padding:9px 10px; border-bottom:1px solid var(--panel-border); }

.code-block{
  background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px;
  font-family:var(--mono); font-size:.82rem; color:var(--cyan); overflow-x:auto; white-space:pre;
}
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-blue{ color:var(--blue); }
.code-block .c-red{ color:var(--red); }

.btn-quiz{
  background:transparent; border:1px solid var(--blue-dim); color:var(--blue);
  font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s;
}
.btn-quiz:hover{ background:var(--blue); color:#04101f; }

.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:150;
  width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border);
  background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; backdrop-filter:blur(3px);
}
.nav-btn:hover{ color:var(--blue); border-color:var(--blue-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--blue); box-shadow:0 0 6px var(--blue); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--blue) !important; }

@media (max-width: 768px){
  .mega{ font-size:1.9rem; }
  h1.title{ font-size:1.5rem; }
  .slide{ padding:24px 20px 90px 20px; }
  .mod-num{ display:none; }
}
</style>
</head>

<script>
const slides = [];
function addSlide(html, opts={}){

}

/* ---------- SLIDE 0 · COVER ---------- */
addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="boot-lines">
    <div>[ <span class="ok">OK</span> ] Retomando sesión ...................... clase_04.iso</div>
    <div>[ <span class="ok">OK</span> ] Cargando subconjunto de lenguaje ...... c_freestanding.h</div>
    <div>[ <span class="ok">OK</span> ] Preparando transición ................. modo real → modo protegido</div>
  </div>
  <div class="eyebrow">boot sequence · clase 04</div>
  <h1 class="mega">C mínimo <span class="kernel">&amp;</span><br>Modo Protegido</h1>

  <div style="font-family:var(--mono); font-size:.85rem; color:var(--text-dim);">
    <i class="fa-solid fa-keyboard"></i> usá <span class="accent">← →</span> o hacé click en las flechas para navegar
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 1 · REPASO + POR QUE C ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">antes de arrancar</div>
  <h1 class="title">No van a "aprender <span class="accent">C</span>" hoy</h1>
  <div class="panel">
    <p style="font-size:1.05rem; line-height:1.7;">
      Van a aprender el <b>subconjunto mínimo</b> que un kernel necesita: tipos, punteros, structs y funciones.
      Nada de librería estándar, nada de <code>printf</code>, nada de <code>malloc</code>. Es menos "aprender un lenguaje nuevo"
      y más "una forma un poco distinta de escribir la lógica que ya saben plantear".
    </p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-memory"></i><h4>¿Por qué no solo ASM?</h4><p>Structs y funciones hacen manejable un kernel real</p></div>
    <div class="card-min"><i class="fa-solid fa-microchip"></i><h4>¿Por qué no Java/C#?</h4><p>Necesitan un runtime que un kernel de juguete no tiene</p></div>
    <div class="card-min"><i class="fa-solid fa-code"></i><h4>El punto medio</h4><p>C freestanding: control total, sin depender de un SO</p></div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 2 · C NORMAL VS C FREESTANDING ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">C normal vs. C "freestanding"</div>
  <h1 class="title">Lo que <span class="accent">sí</span> y lo que <span class="accent-red">no</span> vamos a usar</h1>
  <div class="row g-3">
    <div class="col-md-6">
      <div class="panel h-100">
        <div class="term-tag">disponible</div>
        <ul class="checklist">
          <li>Tipos: <code>int</code>, <code>char</code>, <code>unsigned char</code>, etc.</li>
          <li>Punteros y arreglos</li>
          <li>Structs</li>
          <li>Funciones y control de flujo (if/while/for)</li>
          <li>Operadores a nivel de bits</li>
        </ul>
      </div>
    </div>
    <div class="col-md-6">
      <div class="panel h-100">
        <div class="term-tag" style="border-color:var(--red); color:var(--red);">no disponible (todavía)</div>
        <ul class="checklist no">
          <li><code>printf</code>, <code>scanf</code> — no hay librería estándar</li>
          <li><code>malloc</code> / <code>free</code> — no hay gestor de memoria propio (aún)</li>
          <li>Excepciones, try/catch — eso no existe en C</li>
          <li>Cualquier <code>#include</code> del sistema operativo anfitrión</li>
        </ul>
      </div>
    </div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 3 · SINTAXIS MINIMA ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">lo esencial</div>
  <h1 class="title">La <span class="accent">sintaxis</span> que vamos a usar</h1>
  <div class="code-block">
<span class="c-dim">// tipos y variables</span>
<span class="c-blue">unsigned char</span> c = <span class="c-amber">'A'</span>;
<span class="c-blue">unsigned short</span> valor = <span class="c-amber">1234</span>;

<span class="c-dim">// puntero: una dirección de memoria</span>
<span class="c-blue">unsigned char</span> *pantalla = (<span class="c-blue">unsigned char</span>*) <span class="c-green">0xb8000</span>;

<span class="c-dim">// struct: agrupar datos relacionados</span>
<span class="c-blue">struct</span> proceso {
    <span class="c-blue">int</span> id;
    <span class="c-blue">int</span> estado;
};

<span class="c-dim">// función simple, sin librería estándar</span>
<span class="c-blue">void</span> escribir_caracter(<span class="c-blue">char</span> c, <span class="c-blue">int</span> pos) {
    pantalla[pos] = c;
}
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 4 · QUIZ MODULO 1 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">
  <div class="eyebrow" style="justify-content:center;">check de salida · módulo 1</div>
  <h1 class="title"><i class="fa-solid fa-code accent"></i> Antes de compilar...</h1>
  <p class="subtitle">Repasemos qué es "C freestanding"</p>
  <button class="btn-quiz" onclick="quizModulo1()"><i class="fa-solid fa-play"></i> Iniciar repaso</button>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 5 · TRANSICIÓN MÓDULO 2 ---------- */
addSlide(`
<div class="mod-hero animate__animated animate__fadeIn">
  <div class="mod-num accent-amber">02</div>
  <div class="eyebrow">módulo 2 · práctica</div>
  <h1 class="mega" style="font-size:2.8rem;">De modo real<br>a <span class="kernel" style="color:var(--amber);">modo protegido</span></h1>
  <h2 class="subtitle">El paso que nos deja usar C de verdad</h2>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 6 · POR QUE MODO PROTEGIDO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">modo real vs. modo protegido</div>
  <h1 class="title">¿Por qué <span class="accent-amber">no alcanza</span> el modo real?</h1>
  <div class="panel">
    <p>El bootloader de la clase pasada corrió en <b>modo real</b>: solo 1 MB de memoria accesible y direcciones de 16 bits.
    Para correr C "de verdad" (con más memoria y un modelo de direcciones normal) necesitamos pasar a
    <b>modo protegido</b>: 32 bits, acceso a toda la memoria, y la base para multitarea más adelante.</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-lock"></i><h4>Modo real</h4><p>16 bits, 1 MB, sin protección de memoria</p></div>
    <div class="card-min"><i class="fa-solid fa-lock-open"></i><h4>Modo protegido</h4><p>32 bits, 4 GB direccionables, aísla procesos</p></div>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 7 · GDT ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">la pieza que falta: GDT</div>
  <h1 class="title">La <span class="accent-amber">Tabla Global de Descriptores</span></h1>
  <div class="panel">
    <p>Antes de saltar a modo protegido, la CPU necesita una <b>GDT</b> (Global Descriptor Table): una tabla que define
    los segmentos de código y datos disponibles. Es un requisito obligatorio del procesador, no una opción de diseño nuestra.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">; gdt.asm — una GDT mínima con 3 entradas</span>
gdt_start:
    dq 0                      <span class="c-dim">; descriptor nulo obligatorio</span>

gdt_code:                     <span class="c-dim">; segmento de código, 0-4GB</span>
    dw 0xffff, 0
    db 0, 10011010b, 11001111b, 0

gdt_data:                     <span class="c-dim">; segmento de datos, 0-4GB</span>
    dw 0xffff, 0
    db 0, 10010010b, 11001111b, 0
gdt_end:

<span class="c-dim">; el descriptor que "lgdt" necesita: tamaño (16 bits) + dirección (32 bits)</span>
gdt_descriptor:
    dw gdt_end - gdt_start - 1
    dd gdt_start

<span class="c-dim">; offsets de cada segmento dentro de la GDT (los usamos como selectores)</span>
CODE_SEG equ gdt_code - gdt_start
DATA_SEG equ gdt_data - gdt_start
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 8 · SALTO A MODO PROTEGIDO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el salto</div>
  <h1 class="title">Primero cargar el kernel, <span class="accent-amber">después saltar</span></h1>
  <div class="panel">
    <p>Ojo con el orden: las interrupciones de BIOS (como leer el disco) solo funcionan en <b>modo real</b>. Por eso, todavía en modo real, primero copiamos nuestro <code>kernel.bin</code> del disco a memoria — recién después activamos el modo protegido.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">; dentro de boot.asm — TODAVÍA en modo real</span>
mov bx, KERNEL_OFFSET        <span class="c-dim">; ej. 0x1000 — dónde va a quedar el kernel</span>
mov dh, 15                   <span class="c-dim">; cantidad de sectores a leer (ajustar al tamaño real)</span>
mov dl, [BOOT_DRIVE]
call leer_disco               <span class="c-dim">; usa int 0x13 — solo funciona en modo real</span>

<span class="c-dim">; recién ahora activamos modo protegido</span>
cli                          <span class="c-dim">; deshabilitar interrupciones</span>
lgdt [gdt_descriptor]        <span class="c-dim">; cargar la GDT</span>

mov eax, cr0
or eax, 1                    <span class="c-dim">; activar el bit PE (Protection Enable)</span>
mov cr0, eax

jmp CODE_SEG:init_pm         <span class="c-dim">; salto lejano para "purgar" el pipeline</span>

[bits 32]
init_pm:
    mov ax, DATA_SEG
    mov ds, ax
    mov ss, ax
    <span class="c-dim">; el kernel ya está en memoria desde el paso anterior</span>
    call KERNEL_OFFSET        <span class="c-dim">; saltamos a nuestro kernel en C</span>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 8B · LINKER SCRIPT ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">la pieza que faltaba: linker.ld</div>
  <h1 class="title">Decirle al linker <span class="accent-amber">dónde vive</span> el kernel</h1>
  <div class="panel">
    <p>El linker necesita un script propio para dos cosas: ubicar el código exactamente en <code>KERNEL_OFFSET</code> (la misma dirección adonde lo cargamos desde el disco), y definir el símbolo <code>_kernel_end</code> que después usa <code>kmalloc()</code> (Clase 7) para saber dónde empieza la memoria libre.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">/* linker.ld */</span>
ENTRY(_start)
SECTIONS
{
    <span class="c-dim">/* debe coincidir con KERNEL_OFFSET usado en boot.asm */</span>
    . = <span class="c-amber">0x1000</span>;

    .text : { *(.text) }
    .data : { *(.data) }
    .bss  : { *(.bss)  }

    _kernel_end = .;   <span class="c-dim">// acá empieza la memoria libre para kmalloc()</span>
}
  </div>

/* ============================================================
   MOTOR DE NAVEGACIÓN
   ============================================================ */
let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{
    d.classList.toggle('on', i===current);
  });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';

  const s = slides[current];
  const badge = document.getElementById('module-badge');
  badge.textContent = 'MÓDULO ' + s.module + ' · ' + (s.mtype === 'teoria' ? 'TEORÍA' : 'PRÁCTICA');
  badge.className = s.mtype === 'teoria' ? 'mod-teoria' : 'mod-practica';
  document.getElementById('clockLabel').textContent = s.clock;

  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}

function goTo(i){
  if(i<0 || i>=slides.length) return;
  current = i;
  render();
}
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
render();

/* ============================================================

const swalBase = {
  background: 'var(--bg-1)',
  color: 'var(--text)',
  customClass: { popup: 'so-popup', title: 'so-title' },
  confirmButtonColor: '#4ea1ff',
  cancelButtonColor: '#6d7c8c',
};

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({
    ...swalBase,
    title,
    html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`,
    input: 'radio',
    inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])),
    inputValidator: (v)=> !v && '¡Elegí una opción!',
    confirmButtonText: 'Responder',
  });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({
    ...swalBase,
    icon: correct ? 'success' : 'error',
    title: correct ? '¡Correcto!' : 'No exactamente...',
    html: `<p style="color:var(--text-dim);">${explain}</p>`,
    confirmButtonText: 'Seguir',
  });
  return correct;
}

async function quizModulo1(){
  await askMC(
    'C freestanding',
    '¿Cuál de estas SÍ podemos usar en nuestro C mínimo para el kernel?',
    ['printf()','malloc()','structs y punteros','try/catch'], 2,
    'Structs, punteros, tipos y funciones están disponibles. printf, malloc y las excepciones dependen de una librería estándar que no tenemos.'
  );
  await askMC(
    '¿Por qué C y no Java o C#?',
    '¿Cuál es la razón principal para no usar un lenguaje como Java o C# en el kernel?',
    ['Son más lentos para escribir','Necesitan un runtime que un kernel de juguete no tiene','No permiten usar variables','No existen compiladores para esos lenguajes'], 1,
    'Java y C# dependen de una máquina virtual o runtime que a su vez corre sobre un sistema operativo — algo que nuestro kernel todavía no es.'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 1 completo', text:'Ahora sí, a pasar a modo protegido.'});
}
