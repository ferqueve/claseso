const slides=[];function addSlide(html,opts={}){slides.push({html,module:opts.module||1,mtype:opts.mtype||'teoria',clock:opts.clock||''})}

<div class="cover animate__animated animate__fadeIn"><div class="boot-lines"><div>[ <span class="ok">OK</span> ] Driver de teclado .................... activo</div><div>[ <span class="ok">OK</span> ] Sistema de archivos .................. montado</div><div>[ <span class="ok">OK</span> ] Iniciando shell ....................... toy-os&gt;</div></div><div class="eyebrow">boot sequence · clase_14</div><h1 class="mega">Shell pequeña<br><span class="kernel">/ consola</span></h1><h2 class="subtitle" style="margin-top:1rem;">Del teclado y el sistema de archivos a una interfaz usable</h2><div style="font-family:var(--mono);font-size:.85rem;color:var(--text-dim);"><i class="fa-solid fa-keyboard"></i> usá <span class="accent">← →</span> para navegar</div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:35'});

addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">objetivo</div><h1 class="title">Una shell no es magia: es un <span class="accent">bucle</span></h1><div class="panel"><ul class="checklist"><li>Lee caracteres del driver de teclado.</li><li>Construye una línea hasta Enter.</li><li>Parsea el comando y llama funciones del kernel.</li><li>Vuelve a imprimir el prompt.</li></ul></div><div class="code-block" style="margin-top:16px">while (1) {

}</div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:35'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">alcance realista</div><h1 class="title">Shell mínima para un kernel mínimo</h1><div class="grid-cards"><div class="card-min"><i class="fa-solid fa-circle-question"></i><h4>help</h4><p>Muestra los comandos disponibles.</p></div><div class="card-min"><i class="fa-solid fa-broom"></i><h4>clear</h4><p>Limpia pantalla y reubica cursor.</p></div><div class="card-min"><i class="fa-solid fa-folder-open"></i><h4>ls / cat</h4><p>Usa el sistema de archivos para listar y leer.</p></div></div><div class="panel" style="margin-top:16px"><p style="margin:0">No implementamos procesos, pipes, permisos ni PATH. La shell llama funciones internas del kernel.</p></div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:35'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">entrada de línea</div><h1 class="title">Del teclado al <span class="accent">buffer de comando</span></h1><div class="panel"><p>El driver ya deja caracteres en un buffer circular. La shell consume esos caracteres, los imprime en pantalla y arma una cadena terminada en cero.</p></div><div class="code-block" style="margin-top:16px;font-size:.84rem">void shell_leer_linea(char *buf, int max) {
    int pos = 0;
    while (1) {
        char c = teclado_leer();
        if (c == 0) continue;

        if (c == '\n') { pantalla_putc('\n'); break; }
        if (c == '\b') {
            if (pos > 0) { pos--; pantalla_borrar_ultimo(); }
            continue;
        }
        if (pos < max - 1) {
            buf[pos++] = c;
            pantalla_putc(c);
        }
    }
    buf[pos] = 0;
}</div></div>`,{module:1,mtype:'practica',clock:'18:15 – 19:35'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">sin string.h</div><h1 class="title">Comparar comandos <span class="accent">a mano</span></h1><div class="code-block">int str_eq(const char *a, const char *b) {
    int i = 0;
    while (a[i] && b[i]) {
        if (a[i] != b[i]) return 0;
        i++;
    }
    return a[i] == 0 && b[i] == 0;
}

int empieza_con(const char *s, const char *prefijo) {
    int i = 0;
    while (prefijo[i]) {
        if (s[i] != prefijo[i]) return 0;
        i++;
    }
    return 1;
}</div><div class="panel" style="margin-top:16px"><p style="margin:0">Como seguimos sin biblioteca estándar, todo lo que normalmente haría <code>strcmp</code> o <code>strncmp</code> se implementa pequeño y explícito.</p></div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">parser mínimo</div><h1 class="title">Separar comando y argumento</h1><div class="code-block" style="font-size:.84rem">void partir_primera_palabra(char *linea, char **cmd, char **arg) {
    int i = 0;
    *cmd = linea;

    while (linea[i] && linea[i] != ' ') i++;

    if (linea[i] == 0) {
        *arg = linea + i;
        return;
    }

    linea[i] = 0;
    i++;
    while (linea[i] == ' ') i++;
    *arg = linea + i;
}</div><div class="panel" style="margin-top:16px"><p style="margin:0">Con esto alcanza para comandos tipo <code>cat notas.txt</code> o <code>write notas.txt hola</code> si luego partimos el segundo argumento.</p></div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">dispatcher</div><h1 class="title">Ejecutar comandos internos</h1><div class="code-block" style="font-size:.84rem">void shell_ejecutar(char *linea) {
    char *cmd;
    char *arg;
    partir_primera_palabra(linea, &cmd, &arg);

    if (str_eq(cmd, "help"))  cmd_help();
    else if (str_eq(cmd, "clear")) pantalla_limpiar();
    else if (str_eq(cmd, "ls"))    fs_listar();
    else if (str_eq(cmd, "cat"))   cmd_cat(arg);
    else if (str_eq(cmd, "echo"))  { pantalla_print(arg); pantalla_putc('\n'); }
    else if (str_eq(cmd, "write")) cmd_write(arg);
    else if (cmd[0] != 0) {
        pantalla_print("comando no encontrado: ");
        pantalla_print(cmd);
        pantalla_putc('\n');
    }
}</div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">comandos de archivos</div><h1 class="title">Conectar la shell con el <span class="accent">FS</span></h1><div class="code-block" style="font-size:.82rem">void cmd_cat(char *nombre) {
    char buffer[512];
    int n = fs_leer_archivo(nombre, buffer, 511);
    if (n < 0) { pantalla_print("archivo no encontrado\n"); return; }
    buffer[n] = 0;
    pantalla_print(buffer);
    pantalla_putc('\n');
}

void cmd_write(char *args) {
    char *nombre;
    char *texto;
    partir_primera_palabra(args, &nombre, &texto);
    if (nombre[0] == 0 || texto[0] == 0) {
        pantalla_print("uso: write nombre texto\n"); return;
    }
    fs_escribir_archivo(nombre, texto, strlen_simple(texto));
}</div></div>`,{module:3,mtype:'practica',clock:'21:05 – 22:30'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">experiencia de usuario</div><h1 class="title">Prompt, cursor y errores claros</h1><div class="grid-cards"><div class="card-min"><i class="fa-solid fa-terminal"></i><h4>Prompt</h4><p><code>toy-os&gt;</code> confirma que el kernel espera una orden.</p></div><div class="card-min"><i class="fa-solid fa-delete-left"></i><h4>Backspace</h4><p>No solo borra del buffer: también borra visualmente en pantalla.</p></div><div class="card-min"><i class="fa-solid fa-triangle-exclamation"></i><h4>Errores</h4><p>Mostrar uso esperado: <code>uso: write nombre texto</code>.</p></div></div><div class="code-block" style="margin-top:16px">void shell_prompt(void) {

let current=0;const deck=document.getElementById('deck'),dotsWrap=document.getElementById('dotsWrap');slides.forEach((s,i)=>{const div=document.createElement('div');div.className='slide'+(i===0?' active':'');div.id='slide-'+i;div.innerHTML=s.html;deck.appendChild(div);const d=document.createElement('span');d.className='dotnav'+(i===0?' on':'');d.onclick=()=>goTo(i);dotsWrap.appendChild(d)});document.getElementById('counterTotal').textContent=slides.length;function render(){document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active',i===current));document.querySelectorAll('.dotnav').forEach((d,i)=>d.classList.toggle('on',i===current));document.getElementById('counterNow').textContent=current+1;document.getElementById('progressFill').style.width=((current+1)/slides.length*100)+'%';const s=slides[current],badge=document.getElementById('module-badge');badge.textContent='MÓDULO '+s.module+' · '+(s.mtype==='teoria'?'TEORÍA':'PRÁCTICA');badge.className=s.mtype==='teoria'?'mod-teoria':'mod-practica';document.getElementById('clockLabel').textContent=s.clock}function goTo(i){if(i<0||i>=slides.length)return;current=i;render()}document.getElementById('nextBtn').onclick=()=>goTo(current+1);document.getElementById('prevBtn').onclick=()=>goTo(current-1);document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(current+1);if(e.key==='ArrowLeft')goTo(current-1)});render();

 Swal.fire({...swalBase,icon:'success',title:'¡Clase completa!',text:'Listo: el kernel ya puede recibir órdenes.'});
