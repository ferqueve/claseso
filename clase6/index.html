<style>
:root{
  --bg-0:#070a0f;
  --bg-1:#0d131b;
  --bg-2:#121a24;
  --panel-border:#1f2b38;
  --green:#39ff88;
  --green-dim:#1f8a52;
  --amber:#ffb454;
  --cyan:#5ccfe6;
  --pink:#ff6ec7;
  --pink-dim:#8a2f6d;
  --red:#ff5c7a;
  --text:#dbe4ea;
  --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse at top left, rgba(255,110,199,0.06), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text);
  font-family:var(--display);
  overflow:hidden;
  height:100vh;
}
::selection{ background:var(--pink); color:#210a19; }

.crt-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:500;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.statusbar{
  position:fixed; top:0; left:0; right:0; height:42px; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75));
  border-bottom:1px solid var(--panel-border);
  font-family:var(--mono); font-size:12.5px; letter-spacing:.03em;
  color:var(--text-dim);
}
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--pink); box-shadow:0 0 6px var(--pink); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#module-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid currentColor; }
.mod-teoria{ color:var(--cyan); }
.mod-practica{ color:var(--amber); }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--pink-dim), var(--pink)); box-shadow:0 0 8px var(--pink); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--pink); display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--pink); }
.accent-amber{ color:var(--amber); }
.accent-cyan{ color:var(--cyan); }
.accent-green{ color:var(--green); }
.accent-red{ color:var(--red); }

.panel{
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative;
}
.panel::before{
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,110,199,.4), transparent);
}
.term-tag{
  font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px;
  background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px;
}

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#7a3a63; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.boot-lines .warn{ color:var(--red); }
.mega{ font-size:3.3rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--pink); }

.mod-hero{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
.mod-num{ font-family:var(--mono); font-size:5rem; font-weight:700; opacity:.18; position:absolute; right:70px; top:90px; }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; transition:transform .2s, border-color .2s; }
.card-min:hover{ transform:translateY(-3px); border-color:var(--pink-dim); }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

.code-block{
  background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px;
  font-family:var(--mono); font-size:.8rem; color:var(--cyan); overflow-x:auto; white-space:pre;
}
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-pink{ color:var(--pink); }
.code-block .c-red{ color:var(--red); }

.btn-quiz{
  background:transparent; border:1px solid var(--pink-dim); color:var(--pink);
  font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s;
}
.btn-quiz:hover{ background:var(--pink); color:#210a19; }

.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:150;
  width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border);
  background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; backdrop-filter:blur(3px);
}
.nav-btn:hover{ color:var(--pink); border-color:var(--pink-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--pink); box-shadow:0 0 6px var(--pink); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--pink) !important; }

@media (max-width: 768px){
  .mega{ font-size:1.8rem; }
  h1.title{ font-size:1.5rem; }
  .slide{ padding:24px 20px 90px 20px; }
  .mod-num{ display:none; }
}
</style>

<script>
const slides = [];
function addSlide(html, opts={}){
  slides.push({html, module:opts.module || 1, mtype: opts.mtype || 'teoria', clock: opts.clock || ''});
}

/* ---------- SLIDE 0 · COVER ---------- */
addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="boot-lines">
    <div>[ <span class="ok">OK</span> ] Retomando sesión ...................... clase_06.iso</div>
    <div>[ <span class="warn">!!</span> ] Detectada condición de carrera ........ contador_compartido</div>

  </div>

/* ---------- SLIDE 1 · REPASO + AGENDA ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">repaso + agenda</div>
  <h1 class="title">Tu kernel ya <span class="accent">planifica</span>... ¿y si dos procesos chocan?</h1>
  <div class="panel">
    <ul class="checklist">
      <li>La clase pasada agregamos PCB, estados y un scheduler round-robin cooperativo.</li>
      <li>Ahora: ¿qué pasa si dos procesos tocan el <b>mismo dato</b> al mismo tiempo?</li>
    </ul>
  </div>
  <div class="grid-cards" style="margin-top:18px;">
    <div class="card-min">
      <i class="fa-solid fa-bolt"></i>
      <h4 class="accent-cyan">Módulo 1 · 18:15–19:35</h4>
      <p>Condiciones de carrera, sección crítica y exclusión mutua. <b>Teoría.</b></p>
    </div>
    <div class="card-min">
      <i class="fa-solid fa-traffic-light"></i>
      <h4 class="accent-amber">Módulo 2 · 19:45–21:00</h4>
      <p>Implementar un semáforo en C y proteger una sección crítica. <b>Práctica.</b></p>
    </div>
    <div class="card-min">
      <i class="fa-solid fa-people-group"></i>
      <h4 class="accent-amber">Módulo 3 · 21:05–22:30</h4>
      <p>Monitores, productor-consumidor y los demás problemas clásicos. <b>Práctica + quiz.</b></p>
    </div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 2 · CONDICIONES DE CARRERA ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el problema</div>
  <h1 class="title">Una <span class="accent">condición de carrera</span> en tu kernel</h1>
  <div class="panel">
    <p>Imaginá dos procesos que incrementan un contador compartido. <code>contador++</code> parece una sola instrucción, pero en realidad son <b>tres pasos</b>: leer, sumar, escribir. Si el scheduler interrumpe justo en el medio, se pierde una actualización.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// lo que el proceso "cree" que hace:</span>
contador++;

<span class="c-dim">// lo que realmente pasa (3 pasos, no atómico):</span>
<span class="c-amber">temp = contador;</span>      <span class="c-dim">// 1. leer</span>
<span class="c-amber">temp = temp + 1;</span>       <span class="c-dim">// 2. sumar</span>
<span class="c-amber">contador = temp;</span>       <span class="c-dim">// 3. escribir  ← si acá cambia de proceso, se pierde una suma</span>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 2B · TRAZA CONCRETA DEL LOST UPDATE ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">viéndolo pasar, instrucción por instrucción</div>
  <h1 class="title">Cómo se <span class="accent">pierde</span> una suma, en cámara lenta</h1>
  <div class="panel">
    <p>Supongamos que <code>contador</code> vale <b>5</b>, y el scheduler interrumpe a Proceso A justo después de leer, antes de escribir. Esto es lo que pasa si Proceso B corre en el medio:</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">Paso   Proceso A            Proceso B            contador (memoria)</span>
1      temp_A = contador    —                    5
2      (interrumpido)       temp_B = contador    5
3      —                    temp_B = temp_B + 1  5
4      —                    contador = temp_B    <span class="c-amber">6</span>
5      temp_A = temp_A + 1  —                    6
6      contador = temp_A    —                    <span class="c-red">6   ← debería ser 7!</span>
  </div>
  <div class="panel" style="margin-top:16px; border-color:var(--red);">
    <div class="term-tag" style="border-color:var(--red); color:var(--red);">qué pasó</div>
    <p style="margin:0;">Proceso A leyó <code>contador = 5</code> <b>antes</b> de que B lo actualizara a 6, y en el paso 6 lo pisa con <code>temp_A + 1 = 6</code> — la suma de B se perdió por completo. Dos incrementos, y el contador solo subió una vez.</p>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 3 · SECCION CRITICA Y EXCLUSION MUTUA ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">la solución conceptual</div>
  <h1 class="title">Sección crítica y <span class="accent">exclusión mutua</span></h1>
  <div class="panel">
    <div class="term-tag">definición</div>
    <p>La <b>sección crítica</b> es el fragmento de código que accede a un recurso compartido. La <b>exclusión mutua</b> garantiza que solo un proceso esté dentro de esa sección a la vez.</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-door-closed"></i><h4>Exclusión mutua</h4><p>Solo un proceso adentro a la vez</p></div>
    <div class="card-min"><i class="fa-solid fa-forward"></i><h4>Progreso</h4><p>Si nadie está adentro, alguien debe poder entrar</p></div>
    <div class="card-min"><i class="fa-solid fa-hourglass-half"></i><h4>Espera acotada</h4><p>Nadie espera para siempre</p></div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 3B · ANALOGIA DEL BAÑO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">pensándolo en el mundo real</div>
  <h1 class="title">Un baño de <span class="accent">un solo cuarto</span></h1>
  <div class="panel">
    <p style="font-size:1.02rem; line-height:1.7;">
      Imaginate una oficina con un solo baño y una sola llave, colgada afuera de la puerta. Si querés
      entrar, primero tenés que agarrar la llave. Si la llave no está (alguien más la tiene), esperás
      afuera. El que está adentro, cuando termina, cuelga la llave de nuevo — recién ahí puede entrar
      el siguiente.
    </p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-door-closed"></i><h4>El baño</h4><p>Es la sección crítica — el recurso compartido</p></div>
    <div class="card-min"><i class="fa-solid fa-key"></i><h4>La llave</h4><p>Es el semáforo/mutex — solo puede tenerla una persona a la vez</p></div>
    <div class="card-min"><i class="fa-solid fa-people-line"></i><h4>Los que esperan</h4><p>Son los otros procesos, bloqueados hasta que la llave quede libre</p></div>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">y si alguien se olvida la llave adentro...</div>
    <p style="margin:0;">Ese es exactamente el error de programación que hay que evitar: si un proceso hace <code>sem_wait()</code> pero se olvida el <code>sem_signal()</code> al salir, la llave queda "adentro" para siempre y nadie más puede entrar — el equivalente a colgarse el kernel entero esperando ese semáforo.</p>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">

  <h1 class="title"><i class="fa-solid fa-bolt accent"></i> Antes de programar el semáforo...</h1>

</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

addSlide(`
<div class="mod-hero animate__animated animate__fadeIn">
  <div class="mod-num accent-amber">02</div>
  <div class="eyebrow">módulo 2 · práctica</div>
  <h1 class="mega" style="font-size:2.8rem;">Implementar un<br><span class="kernel" style="color:var(--amber);">Semáforo</span></h1>

</div>

/* ---------- SLIDE 6 · QUE ES UN SEMAFORO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">antes del código: la idea</div>
  <h1 class="title">Por qué se llama <span class="accent-amber">semáforo</span></h1>
  <div class="panel">
    <p style="font-size:1.02rem; line-height:1.7;">
      No es casualidad el nombre: pensá en un <b>semáforo de tránsito</b> de un solo carril. Si está en rojo,
      los autos esperan en fila. Cuando el auto que está adentro del carril sale, el semáforo pasa a verde y
      deja entrar al siguiente. Dijkstra tomó esa misma idea para coordinar procesos: un contador que decide
      quién puede "entrar" y quién tiene que esperar.
    </p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-car"></i><h4>Carril de un solo auto</h4><p>Como un semáforo binario (mutex): solo uno pasa a la vez</p></div>
    <div class="card-min"><i class="fa-solid fa-road"></i><h4>Varios carriles</h4><p>Un semáforo con valor inicial N permite hasta N procesos a la vez</p></div>
    <div class="card-min"><i class="fa-solid fa-triangle-exclamation"></i><h4>Fila de espera</h4><p>Los que no pueden pasar, esperan su turno — no avanzan igual</p></div>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 6B · LAS DOS OPERACIONES ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">un contador con <span class="accent-amber">dos botones</span></div>
  <h1 class="title">wait() y <span class="accent-amber">signal()</span>, sin vueltas</h1>
  <div class="panel">
    <p>Por dentro, un semáforo es apenas un <b>número</b>. Nunca lo tocamos directamente — solo apretamos uno de estos dos "botones":</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-lock"></i><h4>wait()</h4><p>"Quiero pasar." Si el número es mayor a 0, lo resta en 1 y seguís. Si es 0, esperás ahí parado.</p></div>
    <div class="card-min"><i class="fa-solid fa-lock-open"></i><h4>signal()</h4><p>"Ya terminé, pase el que sigue." Suma 1 al número.</p></div>
    <div class="card-min"><i class="fa-solid fa-toggle-on"></i><h4>Semáforo binario</h4><p>Empieza en 1 — funciona como un candado con un solo lugar</p></div>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">un detalle importante, en simple</div>
    <p style="margin:0;">Apretar el botón <code>wait()</code> tiene que ser algo que no se pueda interrumpir a la mitad — si dos procesos aprietan el botón "al mismo tiempo", el semáforo tiene que dejar pasar a uno solo. Eso es lo que garantiza el propio semáforo por dentro, para que nosotros no tengamos que preocuparnos por eso.</p>

</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · semaforo.c</div>
  <h1 class="title">Nuestro <span class="accent-amber">semaforo_t</span> en C</h1>
  <div class="panel">
    <p>Como nuestro scheduler es cooperativo, <code>sem_wait</code> espera <b>cediendo la CPU</b> con <code>proceso_yield()</code> en vez de bloquearse en duro.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// semaforo.c</span>
<span class="c-pink">typedef struct</span> {
    <span class="c-pink">int</span> valor;
} semaforo_t;

<span class="c-pink">void</span> sem_init(semaforo_t *s, <span class="c-pink">int</span> valor_inicial) {
    s->valor = valor_inicial;
}

<span class="c-pink">void</span> sem_wait(semaforo_t *s) {
    <span class="c-pink">while</span> (s->valor <= <span class="c-amber">0</span>) {
        proceso_yield();  <span class="c-dim">// cede la CPU mientras espera</span>
    }
    s->valor--;
}

<span class="c-pink">void</span> sem_signal(semaforo_t *s) {
    s->valor++;
}
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · buffer.c</div>
  <h1 class="title">El código <span class="accent">completo</span></h1>
  <div class="code-block">
<span class="c-dim">#define</span> TAM_BUFFER 8
<span class="c-pink">int</span> buffer[TAM_BUFFER];
<span class="c-pink">int</span> pos_in = <span class="c-amber">0</span>, pos_out = <span class="c-amber">0</span>;

semaforo_t vacios, llenos, mutex;
<span class="c-dim">// sem_init(&vacios, TAM_BUFFER);  sem_init(&llenos, 0);  sem_init(&mutex, 1);</span>

<span class="c-pink">void</span> producir(<span class="c-pink">int</span> dato) {
    sem_wait(&vacios);
    sem_wait(&mutex);
    buffer[pos_in] = dato;
    pos_in = (pos_in + <span class="c-amber">1</span>) % TAM_BUFFER;
    sem_signal(&mutex);
    sem_signal(&llenos);
}

<span class="c-pink">int</span> consumir(<span class="c-pink">void</span>) {
    sem_wait(&llenos);
    sem_wait(&mutex);
    <span class="c-pink">int</span> dato = buffer[pos_out];
    pos_out = (pos_out + <span class="c-amber">1</span>) % TAM_BUFFER;
    sem_signal(&mutex);
    sem_signal(&vacios);
    <span class="c-pink">return</span> dato;
}
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ============================================================
   MOTOR DE NAVEGACIÓN
   ============================================================ */
let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{
    d.classList.toggle('on', i===current);
  });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';

  const s = slides[current];
  const badge = document.getElementById('module-badge');
  badge.textContent = 'MÓDULO ' + s.module + ' · ' + (s.mtype === 'teoria' ? 'TEORÍA' : 'PRÁCTICA');
  badge.className = s.mtype === 'teoria' ? 'mod-teoria' : 'mod-practica';
  document.getElementById('clockLabel').textContent = s.clock;

  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}

function goTo(i){
  if(i<0 || i>=slides.length) return;
  current = i;
  render();
}
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
render();

const swalBase = {
  background: 'var(--bg-1)',
  color: 'var(--text)',
  customClass: { popup: 'so-popup', title: 'so-title' },
  confirmButtonColor: '#ff6ec7',
  cancelButtonColor: '#6d7c8c',

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({
    ...swalBase,
    title,
    html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`,
    input: 'radio',
    inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])),
    inputValidator: (v)=> !v && '¡Elegí una opción!',
    confirmButtonText: 'Responder',
  });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({
    ...swalBase,
    icon: correct ? 'success' : 'error',
    title: correct ? '¡Correcto!' : 'No exactamente...',
    html: `<p style="color:var(--text-dim);">${explain}</p>`,
    confirmButtonText: 'Seguir',
  });
  return correct;
}
