<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO · Clase 3 — Primer Boot de tu SO de Juguete</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f;
  --bg-1:#0d131b;
  --bg-2:#121a24;
  --panel-border:#1f2b38;
  --green:#39ff88;
  --green-dim:#1f8a52;
  --amber:#ffb454;
  --cyan:#5ccfe6;
  --violet:#b98eff;
  --violet-dim:#6a3fa8;
  --red:#ff5c7a;
  --text:#dbe4ea;
  --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse at top left, rgba(185,142,255,0.06), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text);
  font-family:var(--display);
  overflow:hidden;
  height:100vh;
}
::selection{ background:var(--violet); color:#150a25; }

.crt-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:500;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.statusbar{
  position:fixed; top:0; left:0; right:0; height:42px; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75));
  border-bottom:1px solid var(--panel-border);
  font-family:var(--mono); font-size:12.5px; letter-spacing:.03em;
  color:var(--text-dim);
}
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--violet); box-shadow:0 0 6px var(--violet); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#module-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid currentColor; }
.mod-teoria{ color:var(--cyan); }
.mod-practica{ color:var(--amber); }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--violet-dim), var(--violet)); box-shadow:0 0 8px var(--violet); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--violet); display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--violet); }
.accent-amber{ color:var(--amber); }
.accent-cyan{ color:var(--cyan); }
.accent-green{ color:var(--green); }

.panel{
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative;
}
.panel::before{
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(185,142,255,.4), transparent);
}
.term-tag{
  font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px;
  background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px;
}

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#5c4a8a; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.mega{ font-size:3.6rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--violet); }

.mod-hero{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
.mod-num{ font-family:var(--mono); font-size:5rem; font-weight:700; opacity:.18; position:absolute; right:70px; top:90px; }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; transition:transform .2s, border-color .2s; }
.card-min:hover{ transform:translateY(-3px); border-color:var(--violet-dim); }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

.roadmap{ display:flex; flex-direction:column; gap:2px; }
.rm-row{ display:grid; grid-template-columns:110px 1fr; align-items:center; gap:14px; }
.rm-label{ font-family:var(--mono); font-size:.8rem; color:var(--text-dim); text-align:right; }
.rm-track{ background:var(--bg-2); border-radius:4px; height:24px; position:relative; overflow:hidden; border:1px solid var(--panel-border); }
.rm-bar{ position:absolute; top:0; bottom:0; border-radius:4px; opacity:.9; display:flex; align-items:center; padding-left:8px; font-size:.7rem; font-family:var(--mono); white-space:nowrap; color:#04120a; }
.rm-today{ box-shadow:0 0 0 2px var(--violet) inset; }

.code-block{
  background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px;
  font-family:var(--mono); font-size:.83rem; color:var(--cyan); overflow-x:auto; white-space:pre;
}
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-violet{ color:var(--violet); }
.code-block .c-red{ color:var(--red); }

.btn-quiz{
  background:transparent; border:1px solid var(--violet-dim); color:var(--violet);
  font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s;
}
.btn-quiz:hover{ background:var(--violet); color:#150a25; }

.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:150;
  width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border);
  background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; backdrop-filter:blur(3px);
}
.nav-btn:hover{ color:var(--violet); border-color:var(--violet-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--violet); box-shadow:0 0 6px var(--violet); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--violet) !important; }

@media (max-width: 768px){
  .mega{ font-size:2rem; }
  h1.title{ font-size:1.5rem; }
  .slide{ padding:24px 20px 90px 20px; }
  .mod-num{ display:none; }
}
</style>
</head>

<div class="crt-overlay"></div>

<div class="statusbar">
  <div class="seg"><span class="dot"></span> SO · CAMPUS SALTO <span class="cursor">&nbsp;</span></div>

const slides = [];
function addSlide(html, opts={}){
  slides.push({html, module:opts.module || 1, mtype: opts.mtype || 'teoria', clock: opts.clock || ''});

addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="boot-lines">
    <div>[ <span class="ok">OK</span> ] Retomando sesión ...................... clase_03.iso</div>
    <div>[ <span class="ok">OK</span> ] Montando toolchain .................... nasm, gcc, ld, qemu</div>

/* ---------- SLIDE 1 · PRESENTACION DEL PROYECTO FINAL ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el proyecto final</div>
  <h1 class="title">Vamos a construir <span class="accent">un kernel real</span></h1>
  <div class="panel">
    <p style="font-size:1.05rem; line-height:1.7;">
      El trabajo obligatorio de este curso es un <b>sistema operativo de juguete</b>: no una simulación,
      sino un <span class="accent">bootloader y un kernel reales</span>, escritos en ensamblador y C,

    <div class="card-min"><i class="fa-solid fa-keyboard"></i><h4>Lee el teclado</h4><p>Maneja interrupciones de entrada</p></div>
    <div class="card-min"><i class="fa-solid fa-diagram-project"></i><h4>Gestiona procesos</h4><p>Un planificador simple (más adelante, Unidad 4)</p></div>
    <div class="card-min"><i class="fa-solid fa-folder"></i><h4>Guarda archivos</h4><p>Un sistema de archivos mínimo (Unidad 5)</p></div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 2 · HOJA DE RUTA ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">hoja de ruta del proyecto</div>
  <h1 class="title">Cada unidad, <span class="accent">una pieza</span> del kernel</h1>
  <div class="panel">
    <div class="roadmap">
      <div class="rm-row"><div class="rm-label">U3</div><div class="rm-track"><div class="rm-bar rm-today" style="left:0%; width:18%; background:var(--violet);">Bootloader + "Hello Kernel"</div></div></div>
      <div class="rm-row"><div class="rm-label">U4</div><div class="rm-track"><div class="rm-bar" style="left:20%; width:26%; background:var(--cyan);">Modo protegido + procesos</div></div></div>
      <div class="rm-row"><div class="rm-label">U5</div><div class="rm-track"><div class="rm-bar" style="left:48%; width:22%; background:var(--amber);">Memoria + sistema de archivos mínimo</div></div></div>
      <div class="rm-row"><div class="rm-label">U6</div><div class="rm-track"><div class="rm-bar" style="left:72%; width:18%; background:var(--green);">Teclado + I/O por interrupciones</div></div></div>
      <div class="rm-row"><div class="rm-label">U7</div><div class="rm-track"><div class="rm-bar" style="left:82%; width:18%; background:var(--red);">Integración y defensa final</div></div></div>
    </div>
  </div>
  <p style="color:var(--text-dim); font-family:var(--mono); font-size:.8rem; margin-top:10px;">
    <i class="fa-solid fa-circle accent"></i> hoy arrancamos con el bootloader
  </p>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 3 · POR QUE LA TERMINAL ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">CLI, GUI, NUI</div>
  <h1 class="title">Por qué acá vivimos en la <span class="accent">terminal</span></h1>
  <div class="panel">
    <p>Para desarrollo de sistemas de bajo nivel no existe un IDE gráfico que "compile un SO" con un click.
    El flujo real es: <b>editor de texto → ensamblador/compilador → linker → emulador</b>, todo orquestado desde la línea de comandos.</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-terminal"></i><h4>CLI</h4><p>Control preciso y scriptable — lo que vamos a usar</p></div>
    <div class="card-min"><i class="fa-solid fa-window-restore"></i><h4>GUI</h4><p>Útil para el usuario final, no para construir el kernel</p></div>
    <div class="card-min"><i class="fa-solid fa-wave-square"></i><h4>NUI</h4><p>Voz, gestos — fuera del alcance de este proyecto</p></div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 4 · EL TOOLCHAIN ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">herramientas</div>
  <h1 class="title">El <span class="accent">toolchain</span> del proyecto</h1>
  <div class="row g-3">
    <div class="col-md-6">
      <div class="panel h-100">

<span class="c-dim"># instalación en Ubuntu (dentro de la VM)</span>
<span class="c-green">$</span> sudo apt update
<span class="c-green">$</span> sudo apt install -y nasm qemu-system-x86 \\
    build-essential gcc make
      </div>
    </div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

  <div class="eyebrow">módulo 2 · práctica</div>
  <h1 class="mega" style="font-size:3rem;">Escribiendo el<br><span class="kernel" style="color:var(--amber);">Bootloader</span></h1>
  <h2 class="subtitle">Nuestras primeras líneas de ensamblador x86</h2>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 7 · QUE ES UN BOOTLOADER ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">antes de programar</div>
  <h1 class="title">¿Qué hace un <span class="accent-amber">bootloader</span>?</h1>
  <div class="panel">
    <p>Cuando una PC (o QEMU) arranca desde un disco, la BIOS carga los primeros <b>512 bytes</b> del disco
    en la dirección de memoria <code>0x7c00</code> y le pasa el control. Ese código es el bootloader:
    el primer programa que corre, sin ningún sistema operativo debajo.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">1.</span> BIOS enciende, hace POST
<span class="c-dim">2.</span> BIOS lee el <span class="c-amber">sector 0</span> del disco de arranque
<span class="c-dim">3.</span> Verifica la firma mágica <span class="c-green">0x55AA</span> al final del sector
<span class="c-dim">4.</span> Salta a <span class="c-amber">0x7c00</span> y ejecuta nuestro código
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 8 · CODIGO BOOT.ASM ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · boot.asm</div>
  <h1 class="title">Tu primer <span class="accent-amber">"Hello, Toy OS!"</span></h1>
  <div class="code-block">
<span class="c-dim">; boot.asm — nuestro primer bootloader</span>
<span class="c-violet">[org 0x7c00]</span>

<span class="c-green">mov si, message</span>

<span class="c-amber">print_char:</span>
    lodsb
    cmp al, 0
    je done
    mov ah, 0x0e
    int 0x10
    jmp print_char

<span class="c-amber">done:</span>
    jmp $

<span class="c-dim">message: db 'Hello, Toy OS!', 0</span>

<span class="c-dim">; relleno hasta 510 bytes + firma de arranque</span>
times 510-($-$$) db 0
dw 0xaa55
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 9 · COMPILAR Y CORRER ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · ensamblar y arrancar</div>
  <h1 class="title">De <span class="accent-amber">código</span> a pantalla</h1>

<span class="c-dim"># 1. ensamblar el bootloader a binario plano</span>

<span class="c-dim"># 2. arrancar QEMU usando ese binario como "disquete"</span>
<span class="c-green">$</span> qemu-system-x86_64 -fda boot.bin

  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

addSlide(`

/* ---------- SLIDE 11 · TRANSICIÓN MÓDULO 3 ---------- */

/* ============================================================
   MOTOR DE NAVEGACIÓN
   ============================================================ */
let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{
    d.classList.toggle('on', i===current);
  });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';

  const s = slides[current];
  const badge = document.getElementById('module-badge');
  badge.textContent = 'MÓDULO ' + s.module + ' · ' + (s.mtype === 'teoria' ? 'TEORÍA' : 'PRÁCTICA');
  badge.className = s.mtype === 'teoria' ? 'mod-teoria' : 'mod-practica';
  document.getElementById('clockLabel').textContent = s.clock;

  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}

function goTo(i){
  if(i<0 || i>=slides.length) return;
  current = i;
  render();
}
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
render();

/* ============================================================
   QUIZZES (SweetAlert2)
   ============================================================ */
const swalBase = {
  background: 'var(--bg-1)',
  color: 'var(--text)',
  customClass: { popup: 'so-popup', title: 'so-title' },
  confirmButtonColor: '#b98eff',
  cancelButtonColor: '#6d7c8c',
};

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({
    ...swalBase,
    title,
    html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`,
    input: 'radio',
    inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])),
    inputValidator: (v)=> !v && '¡Elegí una opción!',
    confirmButtonText: 'Responder',
  });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({
    ...swalBase,
    icon: correct ? 'success' : 'error',
    title: correct ? '¡Correcto!' : 'No exactamente...',
    html: `<p style="color:var(--text-dim);">${explain}</p>`,
    confirmButtonText: 'Seguir',
  });
  return correct;
}

async function quizModulo1(){
  await askMC(
    'El proyecto final',
    '¿Qué es exactamente el "SO de juguete" que van a construir?',
    ['Una app que simula un SO en Python','Un bootloader y kernel reales, en ensamblador y C, que corren en QEMU','Una configuración especial de Windows','Un script de PowerShell'], 1,
    'Es un <b>bootloader y kernel reales</b>, escritos en ensamblador y C, que arrancan de verdad en QEMU (y luego en VirtualBox).'
  );
  await askMC(
    'El toolchain',
    '¿Qué herramienta usamos para automatizar todo el proceso de compilar y correr el proyecto?',
    ['Photoshop','Make','Excel','Paint'], 1,
    '<b>Make</b> nos permite definir reglas (como <code>make run</code>) que automatizan ensamblar y ejecutar en QEMU.'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 1 completo', text:'Ahora sí, a escribir el bootloader.'});
}

async function quizModulo2(){
  await askMC(
    'El sector de arranque',
    '¿En qué dirección de memoria carga la BIOS el sector de arranque?',
    ['0x0000','0x7c00','0xFFFF','0x1000'], 1,
    'La BIOS carga los primeros 512 bytes del disco en <b>0x7c00</b> y salta ahí para ejecutar el bootloader.'
  );
  await askMC(
    'Firma de arranque',
    '¿Qué valor debe tener el último word (2 bytes) del sector de arranque para que la BIOS lo reconozca como válido?',
    ['0x0000','0xAA55','0xFFFF','0x1234'], 1,
    'La firma mágica <b>0x55AA</b> (almacenada como 0xAA55 en little-endian) le indica a la BIOS que el sector es un disco de arranque válido.'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 2 completo', text:'Ahora automatizamos todo con Make.'});
}
