addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">encaje con ArSaMoOS</div><h1 class="title">El mouse no entra como “juguete gráfico”</h1><div class="grid-cards"><div class="card-min"><i class="fa-solid fa-keyboard"></i><h4>Teclado</h4><p>Ya existe como entrada: lee scancodes desde <code>0x60</code>.</p></div><div class="card-min"><i class="fa-solid fa-computer-mouse"></i><h4>Mouse</h4><p>También habla por <code>0x60</code>, pero avisa mediante <code>IRQ12</code>.</p></div><div class="card-min"><i class="fa-solid fa-list-check"></i><h4>Eventos</h4><p>La aplicación no debería leer puertos; debería recibir eventos.</p></div></div><div class="panel mt-3"><div class="term-tag">idea docente</div><p class="mb-0">El mouse será la excusa para mostrar productores, consumidores, procesos y semáforos con un problema visible.</p></div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:30'});

idt_set_gate(44, (unsigned int)irq12_stub);
pic_desenmascarar_irq(12);</div><button class="btn-quiz mt-3" onclick="quiz('Si el PIC fue remapeado a 32, ¿qué entrada de la IDT corresponde a IRQ12?<br><br>A) 12<br>B) 32<br>C) 44','C','Después del remapeo: interrupción = 32 + IRQ. Entonces 32 + 12 = 44.')"><i class="fa-solid fa-circle-question"></i> Pregunta rápida</button></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:30'});

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">mouse.c</div><h1 class="title">Recibir tres bytes y armar un evento</h1><div class="code-block" style="font-size:.78rem">#include "mouse.h"
#include "pic.h"

static mouse_estado_t estado;
static unsigned char paquete[3];
static int indice = 0;

static unsigned char inb(unsigned short p) { unsigned char v; __asm__ volatile("inb %1,%0":"=a"(v):"Nd"(p)); return v; }
static void outb(unsigned short p, unsigned char v) { __asm__ volatile("outb %0,%1"::"a"(v),"Nd"(p)); }

static int extender_signo(unsigned char valor, unsigned char signo)
{
    if (signo) return (int)valor - 256;
    return (int)valor;
}

void mouse_handler_c(void)
{
    unsigned char b = inb(0x60);

    paquete[indice] = b;
    indice++;

    if (indice < 3) return;
    indice = 0;

    estado.izquierdo = paquete[0] & 1;
    estado.derecho   = (paquete[0] >> 1) & 1;
    estado.medio     = (paquete[0] >> 2) & 1;
    estado.dx = extender_signo(paquete[1], paquete[0] & 0x10);
    estado.dy = extender_signo(paquete[2], paquete[0] & 0x20);

    estado.x += estado.dx;
    estado.y -= estado.dy;
}</div></div>`,{module:2,mtype:'practica',clock:'19:40 – 21:00'});
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">inicialización</div><h1 class="title">Encender el envío de datos del mouse</h1><div class="code-block" style="font-size:.8rem">static void ps2_esperar_lectura(void)
{
    while ((inb(0x64) & 1) == 0) { }
}

static void ps2_esperar_escritura(void)
{
    while ((inb(0x64) & 2) != 0) { }
}

static void mouse_write(unsigned char comando)
{
    ps2_esperar_escritura();
    outb(0x64, 0xD4);      /* siguiente byte va al mouse */
    ps2_esperar_escritura();
    outb(0x60, comando);
}

void mouse_inicializar(void)
{
    estado.x = 40;
    estado.y = 12;

    mouse_write(0xF6);     /* valores por defecto */
    ps2_esperar_lectura();
    inb(0x60);             /* ACK */

    mouse_write(0xF4);     /* empezar a enviar paquetes */
    ps2_esperar_lectura();
    inb(0x60);             /* ACK */

    pic_desenmascarar_irq(12);
}</div></div>`,{module:3,mtype:'practica',clock:'21:05 – 22:10'});
