<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>SO · Clase 9 — Interbloqueos</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f;
  --bg-1:#0d131b;
  --bg-2:#121a24;
  --panel-border:#1f2b38;
  --green:#39ff88;
  --green-dim:#1f8a52;
  --amber:#ffb454;
  --cyan:#5ccfe6;
  --wine:#c24a5a;
  --wine-dim:#6b2530;
  --red:#ff5c7a;
  --text:#dbe4ea;
  --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse at top left, rgba(194,74,90,0.07), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text);
  font-family:var(--display);
  overflow:hidden;
  height:100vh;
}
::selection{ background:var(--wine); color:#1c0509; }

.crt-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:500;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.statusbar{
  position:fixed; top:0; left:0; right:0; height:42px; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75));
  border-bottom:1px solid var(--panel-border);
  font-family:var(--mono); font-size:12.5px; letter-spacing:.03em;
  color:var(--text-dim);
}
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--wine); box-shadow:0 0 6px var(--wine); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#module-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid currentColor; }
.mod-teoria{ color:var(--cyan); }
.mod-practica{ color:var(--amber); }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--wine-dim), var(--wine)); box-shadow:0 0 8px var(--wine); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--wine); display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--wine); }
.accent-amber{ color:var(--amber); }
.accent-cyan{ color:var(--cyan); }
.accent-green{ color:var(--green); }

.panel{
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative;
}
.panel::before{
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(194,74,90,.4), transparent);
}
.term-tag{
  font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px;
  background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px;
}

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#6b2530; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.boot-lines .warn{ color:var(--wine); }
.mega{ font-size:3.4rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--wine); }

.mod-hero{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
.mod-num{ font-family:var(--mono); font-size:5rem; font-weight:700; opacity:.18; position:absolute; right:70px; top:90px; }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; transition:transform .2s, border-color .2s; }
.card-min:hover{ transform:translateY(-3px); border-color:var(--wine-dim); }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

.rag{ display:flex; align-items:center; justify-content:center; gap:40px; flex-wrap:wrap; font-family:var(--mono); font-size:.85rem; }
.rag-node{ display:flex; flex-direction:column; align-items:center; gap:8px; }
.rag-circle{ width:64px; height:64px; border-radius:50%; border:2px solid var(--cyan); display:flex; align-items:center; justify-content:center; color:var(--cyan); font-weight:700; }
.rag-square{ width:56px; height:56px; border:2px solid var(--amber); display:flex; align-items:center; justify-content:center; color:var(--amber); font-weight:700; }
.rag-arrow{ color:var(--wine); font-size:1.6rem; }

table.cmp{ width:100%; border-collapse:collapse; font-size:.9rem; }
table.cmp th{ font-family:var(--mono); text-transform:uppercase; font-size:.72rem; letter-spacing:.05em; color:var(--text-dim); border-bottom:1px solid var(--panel-border); padding:8px 10px; text-align:left; }
table.cmp td{ padding:9px 10px; border-bottom:1px solid var(--panel-border); }

.code-block{
  background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px;
  font-family:var(--mono); font-size:.8rem; color:var(--cyan); overflow-x:auto; white-space:pre;
}
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-wine{ color:var(--wine); }
.code-block .c-red{ color:var(--red); }

.btn-quiz{
  background:transparent; border:1px solid var(--wine-dim); color:var(--wine);
  font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s;
}
.btn-quiz:hover{ background:var(--wine); color:#1c0509; }

.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:150;
  width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border);
  background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; backdrop-filter:blur(3px);
}
.nav-btn:hover{ color:var(--wine); border-color:var(--wine-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--wine); box-shadow:0 0 6px var(--wine); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--wine) !important; }

@media (max-width: 768px){
  .mega{ font-size:1.8rem; }
  h1.title{ font-size:1.5rem; }
  .slide{ padding:24px 20px 90px 20px; }
  .mod-num{ display:none; }
  .rag{ flex-direction:column; }
  .rag-arrow{ transform:rotate(90deg); }
}
</style>
</head>

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el problema</div>
  <h1 class="title">Dos procesos, <span class="accent">esperando eternamente</span></h1>
  <div class="panel">
    <p style="font-size:1.05rem; line-height:1.7;">
      Un <b>interbloqueo</b> ocurre cuando un grupo de procesos queda esperando indefinidamente recursos que
      solo otro proceso del mismo grupo puede liberar — y ninguno va a liberar nada porque, a su vez,
      está esperando. Nadie avanza. Nadie retrocede.
    </p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// el ejemplo clásico de dos semáforos</span>
<span class="c-dim">// Proceso A:</span>              <span class="c-dim">// Proceso B:</span>
sem_wait(&semaforo_1);      sem_wait(&semaforo_2);
sem_wait(&semaforo_2);      sem_wait(&semaforo_1);
<span class="c-red">// ... A espera semaforo_2, que B tiene</span>
<span class="c-red">// ... B espera semaforo_1, que A tiene</span>
<span class="c-red">// interbloqueo</span>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

addSlide(`

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">condiciones necesarias</div>
  <h1 class="title">Las 4 condiciones de <span class="accent">Coffman</span></h1>
  <div class="panel">
    <p>Para que exista un interbloqueo, estas 4 condiciones deben cumplirse <b>simultáneamente</b>. Si rompemos aunque sea una, el interbloqueo no puede ocurrir.</p>

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · reproducir el bug</div>
  <h1 class="title">Un interbloqueo en <span class="accent-amber">2 procesos</span></h1>
  <div class="code-block">
<span class="c-dim">// kernel.c — dos procesos que toman semáforos en orden distinto</span>
semaforo_t sem_disco, sem_pantalla;

<span class="c-wine">void</span> proceso_a(<span class="c-wine">void</span>) {
    sem_wait(&sem_disco);
    proceso_yield();          <span class="c-dim">// simula trabajo — le da tiempo a B de tomar sem_pantalla</span>
    sem_wait(&sem_pantalla);  <span class="c-red">// A espera acá para siempre</span>
    <span class="c-dim">// ... nunca llega</span>
}

<span class="c-wine">void</span> proceso_b(<span class="c-wine">void</span>) {
    sem_wait(&sem_pantalla);
    proceso_yield();
    sem_wait(&sem_disco);     <span class="c-red">// B espera acá para siempre</span>
    <span class="c-dim">// ... nunca llega</span>
}
  </div>
  <div class="panel" style="margin-top:16px; border-color:var(--red);">
    <div class="term-tag" style="border-color:var(--red); color:var(--red);">resultado</div>
    <p style="margin:0;">Corriendo esto en QEMU: ambos procesos quedan en <code>BLOQUEADO</code> para siempre. El scheduler los recorre, pero ninguno pasa a <code>LISTO</code> — el kernel entero se queda "colgado".</p>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · la solución más simple</div>
  <h1 class="title">Romper la <span class="accent-amber">espera circular</span></h1>
  <div class="panel">
    <p>La forma más simple de prevenir interbloqueos: <b>todos los procesos piden los recursos en el mismo orden</b>. Si ambos siempre piden primero <code>sem_disco</code> y después <code>sem_pantalla</code>, nunca puede formarse un ciclo.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// arreglado: mismo orden en los dos procesos</span>
<span class="c-wine">void</span> proceso_a(<span class="c-wine">void</span>) {
    sem_wait(&sem_disco);      <span class="c-green">// siempre primero sem_disco</span>
    sem_wait(&sem_pantalla);   <span class="c-green">// después sem_pantalla</span>
    <span class="c-dim">// ... trabajo ...</span>
    sem_signal(&sem_pantalla);
    sem_signal(&sem_disco);
}

<span class="c-wine">void</span> proceso_b(<span class="c-wine">void</span>) {
    sem_wait(&sem_disco);      <span class="c-green">// mismo orden que A</span>
    sem_wait(&sem_pantalla);
    <span class="c-dim">// ... trabajo ...</span>
    sem_signal(&sem_pantalla);
    sem_signal(&sem_disco);
}
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">otras formas de romper las condiciones</div>
  <h1 class="title">No siempre se rompe la <span class="accent-amber">misma condición</span></h1>
  <div class="grid-cards">
    <div class="card-min"><i class="fa-solid fa-door-open"></i><h4>Contra exclusión mutua</h4><p>Usar recursos que sí se pueden compartir (ej. archivos de solo lectura) cuando sea posible</p></div>

let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{
    d.classList.toggle('on', i===current);
  });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';

  const s = slides[current];
  const badge = document.getElementById('module-badge');
  badge.textContent = 'MÓDULO ' + s.module + ' · ' + (s.mtype === 'teoria' ? 'TEORÍA' : 'PRÁCTICA');
  badge.className = s.mtype === 'teoria' ? 'mod-teoria' : 'mod-practica';
  document.getElementById('clockLabel').textContent = s.clock;

  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}

function goTo(i){
  if(i<0 || i>=slides.length) return;
  current = i;
  render();
}
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
render();

const swalBase = {
  background: 'var(--bg-1)',
  color: 'var(--text)',
  customClass: { popup: 'so-popup', title: 'so-title' },
  confirmButtonColor: '#c24a5a',
  cancelButtonColor: '#6d7c8c',
};

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({
    ...swalBase,
    title,
    html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`,
    input: 'radio',
    inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])),
    inputValidator: (v)=> !v && '¡Elegí una opción!',
    confirmButtonText: 'Responder',
  });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({
    ...swalBase,
    icon: correct ? 'success' : 'error',
    title: correct ? '¡Correcto!' : 'No exactamente...',
    html: `<p style="color:var(--text-dim);">${explain}</p>`,
    confirmButtonText: 'Seguir',
  });
  return correct;
}

async function quizModulo1(){
  await askMC(
    'Interbloqueos',
    '¿Qué señala, en el grafo de asignación de recursos, que hay un interbloqueo?',
    ['Un proceso con prioridad alta','Muchos procesos en estado LISTO','Un ciclo (A espera lo que tiene B, B espera lo que tiene A)','Un nodo sin conexiones'], 2,
    'Un <b>ciclo</b> en el grafo es la señal inequívoca de un interbloqueo: cada proceso del ciclo espera algo que tiene el siguiente.'
  );
  await askMC(
    'Condiciones de Coffman',
    '¿Cuál de estas NO es una de las 4 condiciones necesarias para un interbloqueo?',
    ['Espera circular','Retención y espera','Alta prioridad de proceso','Exclusión mutua'], 2,
    'La prioridad del proceso no es una condición de Coffman. Las 4 son: exclusión mutua, retención y espera, no apropiación, y espera circular.'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 1 completo', text:'Ahora sí, a provocar uno de verdad.'});
}

async function quizModulo2(){
  await askMC(
    'Prevención',
    '¿Qué condición de Coffman rompemos al exigir que todos los procesos pidan los recursos en el mismo orden?',
    ['Exclusión mutua','No apropiación','Retención y espera','Espera circular'], 3,
    'Ordenar los recursos rompe la <b>espera circular</b>: si todos piden en el mismo orden, nunca puede formarse un ciclo de espera.'
  );
  await askMC(
    'Otras estrategias',
    '¿Qué estrategia rompe la condición de "retención y espera"?',
    ['Numerar los recursos','Exigir que un proceso pida todos sus recursos de una vez, al principio','Permitir que el SO le quite recursos a un proceso','Usar solo recursos compartibles'], 1,
    'Si un proceso pide TODOS sus recursos de una vez (o ninguno), no puede quedarse "reteniendo uno mientras espera otro".'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 2 completo', text:'Ahora, evitar, detectar y recuperarse.'});
}

    'Prevención es una regla fija (ej. orden de recursos); evitación (como el algoritmo del banquero) analiza dinámicamente cada pedido antes de concederlo.'
