<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo · Semáforos en Acción</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f; --bg-1:#0d131b; --bg-2:#121a24; --panel-border:#1f2b38;
  --green:#39ff88; --green-dim:#1f8a52; --amber:#ffb454; --red:#ff5c7a;
  --cyan:#5ccfe6; --orange:#ffa94d; --orange-dim:#8a5a1f;
  --text:#dbe4ea; --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace; --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0; background:
    radial-gradient(ellipse at top left, rgba(255,169,77,0.07), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text); font-family:var(--display); overflow:hidden; height:100vh;
}
::selection{ background:var(--orange); color:#211505; }
.crt-overlay{ position:fixed; inset:0; pointer-events:none; z-index:500; background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px); mix-blend-mode:overlay; }

.statusbar{ position:fixed; top:0; left:0; right:0; height:42px; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 18px; background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75)); border-bottom:1px solid var(--panel-border); font-family:var(--mono); font-size:12.5px; color:var(--text-dim); }
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--orange); box-shadow:0 0 6px var(--orange); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--orange-dim), var(--orange)); box-shadow:0 0 8px var(--orange); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{ font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--orange); display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--orange); }

.panel{ background:linear-gradient(180deg, var(--bg-1), var(--bg-2)); border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative; }
.panel::before{ content:''; position:absolute; top:0; left:16px; right:16px; height:1px; background:linear-gradient(90deg, transparent, rgba(255,169,77,.4), transparent); }
.term-tag{ font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px; background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px; }

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#8a6a30; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.mega{ font-size:3.2rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--orange); }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

.code-block{ background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px; font-family:var(--mono); font-size:.82rem; color:var(--cyan); overflow-x:auto; white-space:pre; line-height:1.65; }
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-orange{ color:var(--orange); }
.code-block .c-red{ color:var(--red); }

.screen{
  background:#000; border:2px solid #333; border-radius:6px; padding:16px 20px;
  font-family:var(--mono); font-size:.9rem; line-height:1.9; color:#e0e0e0;
}
.screen .ok-line{ color:#39ff88; }
.screen .bad-line{ color:#ff5c7a; font-weight:700; }
.screen .good-line{ color:#39ff88; font-weight:700; }

.btn-quiz{ background:transparent; border:1px solid var(--orange-dim); color:var(--orange); font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s; }
.btn-quiz:hover{ background:var(--orange); color:#211505; }

.nav-btn{ position:fixed; top:50%; transform:translateY(-50%); z-index:150; width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border); background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:.2s; backdrop-filter:blur(3px); }
.nav-btn:hover{ color:var(--orange); border-color:var(--orange-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--orange); box-shadow:0 0 6px var(--orange); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--orange) !important; }

@media (max-width: 768px){ .mega{ font-size:1.8rem; } h1.title{ font-size:1.5rem; } .slide{ padding:24px 20px 90px 20px; } }
</style>
</head>
<body>
<div class="crt-overlay"></div>

<div class="statusbar">
  <div class="seg"><span class="dot"></span> DEMO · SEMÁFOROS EN ACCIÓN <span class="cursor">&nbsp;</span></div>
  <div class="seg"><i class="fa-solid fa-microchip"></i> Verificado en QEMU real</div>
</div>
<div class="progress-rail"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="deck" id="deck"></div>

<div class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></div>
<div class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></div>
<div class="slide-counter"><span id="counterNow">1</span> / <span id="counterTotal">1</span></div>
<div class="slide-dots" id="dotsWrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>

<script>
const slides = [];
function addSlide(html){ slides.push({html}); }

/* ---------- SLIDE 0 · COVER ---------- */
addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="boot-lines">
    <div>[ <span class="ok">OK</span> ] Creando proceso A ...................... incrementando 2 contadores</div>
    <div>[ <span class="ok">OK</span> ] Creando proceso B ...................... incrementando 2 contadores</div>
    <div>[ <span class="ok">OK</span> ] Ejecutando en QEMU real ................ resultado verificado</div>
  </div>
  <div class="eyebrow">demo práctica · complemento de la clase 6</div>
  <h1 class="mega">Semáforos<br>en <span class="kernel">Acción</span></h1>
  <h2 class="subtitle" style="margin-top:1rem;">2 procesos reales, un experimento, un resultado que no miente</h2>
  <div style="font-family:var(--mono); font-size:.85rem; color:var(--text-dim);">
    <i class="fa-solid fa-keyboard"></i> usá <span class="accent">← →</span> para navegar
  </div>
</div>
`);

/* ---------- SLIDE 1 · REPASO EN 30 SEGUNDOS ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">repaso relámpago</div>
  <h1 class="title">La llave del <span class="accent">baño</span>, de nuevo</h1>
  <div class="panel">
    <p style="font-size:1.05rem; line-height:1.7;">
      Un semáforo es una llave compartida. <code>sem_wait()</code> = "agarro la llave" (si no está,
      espero). <code>sem_signal()</code> = "cuelgo la llave de nuevo". Hoy no lo vamos a explicar más
      en teoría — lo vamos a <b>ver pasar de verdad</b>, agregando 2 procesos a nuestro propio kernel
      y mirando qué número da en pantalla.
    </p>
  </div>
</div>
`);

/* ---------- SLIDE 2 · EL EXPERIMENTO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el experimento, en simple</div>
  <h1 class="title">2 procesos, <span class="accent">2 contadores</span></h1>
  <div class="panel">
    <p>Vamos a crear dos procesos, <b>A</b> y <b>B</b>. Cada uno va a sumar 1, cinco veces, a <b>dos contadores distintos</b>:</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-triangle-exclamation"></i><h4>contador_sin</h4><p>Sin ninguna protección — cada proceso lo toca cuando quiere</p></div>
    <div class="card-min"><i class="fa-solid fa-lock"></i><h4>contador_con</h4><p>Protegido con un semáforo — solo un proceso a la vez lo toca</p></div>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">la pregunta del experimento</div>
    <p style="margin:0;">Si A suma 5 veces y B suma 5 veces, <b>los dos contadores deberían terminar en 10</b>. ¿Va a pasar así en los dos casos?</p>
  </div>
</div>
`);

/* ---------- SLIDE 3 · CODIGO SIN PROTECCION ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el código · sin protección</div>
  <h1 class="title">Así queda <span class="accent">contador_sin</span></h1>
  <div class="code-block">
<span class="c-dim">// esto lo hacen los DOS procesos, 5 veces cada uno</span>
<span class="c-orange">int</span> temp1 = contador_sin;
proceso_yield();          <span class="c-dim">// ← acá el scheduler puede cambiar de proceso</span>
temp1 = temp1 + 1;
contador_sin = temp1;
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">por qué el proceso_yield() en el medio</div>
    <p style="margin:0;">Lo ponemos ahí a propósito, justo entre "leer" y "escribir", para darle al scheduler la <b>oportunidad</b> de cambiar de proceso en el peor momento posible — el mismo truco que usamos para explicar la condición de carrera en la Clase 6.</p>
  </div>
</div>
`);

/* ---------- SLIDE 4 · CODIGO CON PROTECCION ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el código · con protección</div>
  <h1 class="title">Así queda <span class="accent">contador_con</span></h1>
  <div class="code-block">
<span class="c-dim">// exactamente la misma oportunidad de cambio de proceso, pero...</span>
sem_wait(&mutex_demo);    <span class="c-dim">// "quiero agarrar la llave"</span>
<span class="c-orange">int</span> temp2 = contador_con;
proceso_yield();           <span class="c-dim">// ← la MISMA oportunidad que en el otro caso</span>
temp2 = temp2 + 1;
contador_con = temp2;
sem_signal(&mutex_demo);  <span class="c-dim">// "cuelgo la llave de nuevo"</span>
  </div>
  <div class="panel" style="margin-top:16px; border-color:var(--amber);">
    <div class="term-tag" style="border-color:var(--amber); color:var(--amber);">clave del experimento</div>
    <p style="margin:0;">Es <b>el mismo código</b>, con el mismo punto de interrupción — la única diferencia es el semáforo alrededor. Si el otro proceso intenta entrar mientras uno tiene la llave, se queda esperando en <code>sem_wait()</code>, sin poder tocar <code>contador_con</code>.</p>
  </div>
</div>
`);

/* ---------- SLIDE 5 · CORRIENDOLO DE VERDAD ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">no es teoría — lo corrimos</div>
  <h1 class="title">Esto es lo que <span class="accent">apareció en pantalla</span></h1>
  <div class="panel">
    <p>Agregamos este experimento al kernel del curso, lo compilamos con el mismo <code>make</code> de siempre, y lo corrimos en QEMU. Esto es <b>exactamente</b> lo que mostró la pantalla (sin retocar nada):</p>
  </div>
  <div class="screen" style="margin-top:16px;">
AAAAA<br>
BBBBB<br>
Deberia dar 10 en los dos casos:<br>
Sin semaforo: <span class="bad-line">9</span><br>
Con semaforo: <span class="good-line">10</span>
  </div>
  <p style="color:var(--text-dim); font-family:var(--mono); font-size:.8rem; margin-top:12px;">
    (las filas de arriba son los procesos A y B alternando, de la demo del scheduler)
  </p>
</div>
`);

/* ---------- SLIDE 6 · POR QUE DIO 9 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">explicándolo, paso a paso</div>
  <h1 class="title">¿Por qué dio <span class="accent">9</span> y no 10?</h1>
  <div class="panel">
    <p>En algún momento de las 10 sumas totales (5 de A + 5 de B), pasó esto:</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">Proceso A                    Proceso B                    contador_sin</span>
temp1 = contador_sin (5)     —                            5
(se interrumpe acá)         temp1 = contador_sin (5)     5
—                            temp1 = temp1 + 1            5
—                            contador_sin = 6             <span class="c-amber">6</span>
temp1 = temp1 + 1            —                            6
contador_sin = 6             —                            <span class="c-red">6  ← se perdió una suma</span>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">en una sola frase</div>
    <p style="margin:0;">A leyó el contador <b>antes</b> de que B lo actualizara, y cuando A termina de escribir, <b>pisa</b> el resultado de B con un valor viejo. Una de las 10 sumas "desaparece" — por eso 9 en vez de 10.</p>
  </div>
</div>
`);

/* ---------- SLIDE 7 · POR QUE DIO 10 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">y del otro lado</div>
  <h1 class="title">¿Por qué <span class="accent">contador_con</span> siempre da 10?</h1>
  <div class="panel">
    <p>Con el semáforo, cuando A está entre <code>sem_wait</code> y <code>sem_signal</code>, y el scheduler le da la CPU a B, B llega a su propio <code>sem_wait(&mutex_demo)</code> y encuentra la llave <b>ocupada</b>. En vez de tocar <code>contador_con</code>, B se queda esperando ahí — cediendo la CPU una y otra vez — hasta que A termina y hace <code>sem_signal</code>.</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-hourglass-half"></i><h4>Nunca se pisan</h4><p>Solo uno de los dos está "adentro" tocando el contador</p></div>
    <div class="card-min"><i class="fa-solid fa-check-double"></i><h4>10 sumas, 10 aumentos</h4><p>Ninguna suma se pierde, sin importar cuándo interrumpa el scheduler</p></div>
  </div>
</div>
`);

/* ---------- SLIDE 8 · PROBALO VOS MISMO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">para el equipo</div>
  <h1 class="title">Corré esto <span class="accent">en tu propia VM</span></h1>
  <div class="panel">
    <p>Este experimento ya está agregado al proyecto base del curso (<code>toy-os.zip</code>) — es la misma demo de procesos y semáforos que ya tenían, solo que ahora agrega esta comparación. Bajá el proyecto actualizado, corré <code>make run</code>, y vas a ver los mismos números (o parecidos).</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-flask"></i><h4>Probalo varias veces</h4><p>¿Siempre da el mismo número en "sin protección"?</p></div>
    <div class="card-min"><i class="fa-solid fa-code"></i><h4>Subí las iteraciones</h4><p>Cambiá ITERACIONES_DEMO de 5 a 20 y volvé a correr</p></div>
    <div class="card-min"><i class="fa-solid fa-comment"></i><h4>Explicalo con tus palabras</h4><p>¿Podés contar, paso a paso, dónde se pierde la suma?</p></div>
  </div>
</div>
`);

/* ---------- SLIDE 9 · QUIZ ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">
  <div class="eyebrow" style="justify-content:center;">check rápido</div>
  <h1 class="title"><i class="fa-solid fa-circle-question accent"></i> ¿Quedó claro?</h1>
  <p class="subtitle">3 preguntas cortas sobre lo que acabamos de ver</p>
  <button class="btn-quiz" onclick="quizFinal()"><i class="fa-solid fa-play"></i> Iniciar</button>
</div>
`);

/* ---------- SLIDE 10 · CIERRE ---------- */
addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="eyebrow">para llevarse</div>
  <h1 class="mega" style="font-size:2.4rem;">Un semáforo no es<br>teoría — es <span class="kernel">un número</span></h1>
  <div class="panel" style="margin-top:20px; max-width:640px;">
    <p style="margin:0;">La próxima vez que alguien pregunte "¿para qué sirve un semáforo?", la respuesta es esta: la diferencia entre un <b>9</b> y un <b>10</b>, corriendo el mismo código, con el mismo punto de interrupción — la única diferencia es <code>sem_wait</code> y <code>sem_signal</code>.</p>
  </div>
</div>
`);

/* ============================================================
   MOTOR DE NAVEGACIÓN
   ============================================================ */
let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);
  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{ el.classList.toggle('active', i===current); });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{ d.classList.toggle('on', i===current); });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';
  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}
function goTo(i){ if(i<0 || i>=slides.length) return; current = i; render(); }
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{ if(e.key === 'ArrowRight') goTo(current+1); if(e.key === 'ArrowLeft') goTo(current-1); });
render();

/* ============================================================
   QUIZ
   ============================================================ */
const swalBase = { background: 'var(--bg-1)', color: 'var(--text)', customClass: { popup: 'so-popup', title: 'so-title' }, confirmButtonColor: '#ffa94d', cancelButtonColor: '#6d7c8c' };

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({ ...swalBase, title, html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`, input: 'radio', inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])), inputValidator: (v)=> !v && '¡Elegí una opción!', confirmButtonText: 'Responder' });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({ ...swalBase, icon: correct ? 'success' : 'error', title: correct ? '¡Correcto!' : 'No exactamente...', html: `<p style="color:var(--text-dim);">${explain}</p>`, confirmButtonText: 'Seguir' });
  return correct;
}

async function quizFinal(){
  await askMC(
    'El experimento',
    'En la demo, ¿qué diferencia hay entre el código de contador_sin y el de contador_con?',
    ['Usan proceso_yield() en momentos distintos','El de contador_con está envuelto en sem_wait/sem_signal, con el mismo punto de interrupción','contador_con no usa memoria compartida','No hay ninguna diferencia real'], 1,
    'El código es prácticamente idéntico — la única diferencia real es que <code>contador_con</code> está protegido por el semáforo alrededor del mismo punto de interrupción.'
  );
  await askMC(
    'El resultado',
    '¿Por qué contador_sin dio 9 en vez de 10?',
    ['Por un error de tipeo en el código','Porque un proceso leyó un valor viejo y lo pisó, perdiendo la suma del otro proceso','Porque el semáforo estaba mal inicializado','Porque QEMU redondea los números'], 1,
    'Un proceso leyó el contador antes de que el otro lo actualizara, y al escribir, pisó ese cambio con un valor desactualizado — se perdió una de las 10 sumas.'
  );
  await askMC(
    'La garantía',
    '¿Qué garantiza que contador_con siempre dé 10, sin importar cuándo interrumpa el scheduler?',
    ['Que los procesos nunca se interrumpen','Que solo uno de los dos procesos puede estar "adentro" del candado a la vez','Que contador_con es una variable especial de C','Que se ejecuta más rápido que contador_sin'], 1,
    'El semáforo garantiza exclusión mutua: mientras uno tiene la "llave", el otro espera afuera — nunca se pisan.'
  );
  Swal.fire({...swalBase, icon:'success', title:'¡Listo!', text:'Ya viste con números reales por qué existen los semáforos.'});
}
