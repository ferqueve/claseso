<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO · Clase 7 — Gestión de Memoria</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f;
  --bg-1:#0d131b;
  --bg-2:#121a24;
  --panel-border:#1f2b38;
  --green:#39ff88;
  --green-dim:#1f8a52;
  --amber:#ffb454;
  --cyan:#5ccfe6;
  --coral:#ff7d59;
  --coral-dim:#8a3f26;
  --red:#ff5c7a;
  --text:#dbe4ea;
  --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse at top left, rgba(255,125,89,0.06), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text);
  font-family:var(--display);
  overflow:hidden;
  height:100vh;
}
::selection{ background:var(--coral); color:#210d05; }

.crt-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:500;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.statusbar{
  position:fixed; top:0; left:0; right:0; height:42px; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75));
  border-bottom:1px solid var(--panel-border);
  font-family:var(--mono); font-size:12.5px; letter-spacing:.03em;
  color:var(--text-dim);
}
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--coral); box-shadow:0 0 6px var(--coral); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#module-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid currentColor; }
.mod-teoria{ color:var(--cyan); }
.mod-practica{ color:var(--amber); }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--coral-dim), var(--coral)); box-shadow:0 0 8px var(--coral); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--coral); display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--coral); }
.accent-amber{ color:var(--amber); }
.accent-cyan{ color:var(--cyan); }
.accent-green{ color:var(--green); }

.panel{
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative;
}
.panel::before{
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,125,89,.4), transparent);
}
.term-tag{
  font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px;
  background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px;
}

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#7a4530; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.mega{ font-size:3.4rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--coral); }

.mod-hero{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
.mod-num{ font-family:var(--mono); font-size:5rem; font-weight:700; opacity:.18; position:absolute; right:70px; top:90px; }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; transition:transform .2s, border-color .2s; }
.card-min:hover{ transform:translateY(-3px); border-color:var(--coral-dim); }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

/* memory map bar */
.memmap{ display:flex; width:100%; height:46px; border-radius:6px; overflow:hidden; border:1px solid var(--panel-border); font-family:var(--mono); font-size:.72rem; }
.memmap div{ display:flex; align-items:center; justify-content:center; color:#04120a; white-space:nowrap; overflow:hidden; }

table.cmp{ width:100%; border-collapse:collapse; font-size:.9rem; }
table.cmp th{ font-family:var(--mono); text-transform:uppercase; font-size:.72rem; letter-spacing:.05em; color:var(--text-dim); border-bottom:1px solid var(--panel-border); padding:8px 10px; text-align:left; }
table.cmp td{ padding:9px 10px; border-bottom:1px solid var(--panel-border); }

.code-block{
  background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px;
  font-family:var(--mono); font-size:.8rem; color:var(--cyan); overflow-x:auto; white-space:pre;
}
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-coral{ color:var(--coral); }
.code-block .c-red{ color:var(--red); }

.btn-quiz{
  background:transparent; border:1px solid var(--coral-dim); color:var(--coral);
  font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s;
}
.btn-quiz:hover{ background:var(--coral); color:#210d05; }

.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:150;
  width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border);
  background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; backdrop-filter:blur(3px);
}
.nav-btn:hover{ color:var(--coral); border-color:var(--coral-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--coral); box-shadow:0 0 6px var(--coral); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--coral) !important; }

@media (max-width: 768px){
  .mega{ font-size:1.8rem; }
  h1.title{ font-size:1.5rem; }
  .slide{ padding:24px 20px 90px 20px; }
  .mod-num{ display:none; }
  .memmap{ flex-direction:column; height:auto; }
  .memmap div{ height:32px; }
}
</style>
</head>
<body>
<div class="crt-overlay"></div>

<div class="statusbar">
  <div class="seg"><span class="dot"></span> SO · CAMPUS SALTO <span class="cursor">&nbsp;</span></div>
  <div class="seg" id="module-badge">MÓDULO 1 · TEORÍA</div>
  <div class="seg"><i class="fa-regular fa-clock"></i> <span id="clockLabel">18:15 – 19:35</span></div>
</div>
<div class="progress-rail"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

<div class="deck" id="deck"></div>

<div class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></div>
<div class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></div>
<div class="slide-counter"><span id="counterNow">1</span> / <span id="counterTotal">1</span></div>
<div class="slide-dots" id="dotsWrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>

<script>
const slides = [];
function addSlide(html, opts={}){
  slides.push({html, module:opts.module || 1, mtype: opts.mtype || 'teoria', clock: opts.clock || ''});
}

/* ---------- SLIDE 0 · COVER ---------- */
addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="boot-lines">
    <div>[ <span class="ok">OK</span> ] Retomando sesión ...................... clase_07.iso</div>
    <div>[ <span class="ok">OK</span> ] Mapeando memoria física ............... 0x00000000 - 0x00FFFFFF</div>
    <div>[ <span class="ok">OK</span> ] Preparando heap del kernel ........... kmalloc()</div>
  </div>
  <div class="eyebrow">boot sequence · clase 07</div>
  <h1 class="mega">Gestión de <span class="kernel">Memoria</span></h1>
  <h2 class="subtitle" style="margin-top:1rem;">Unidad 5: sin malloc(), ¿cómo reserva memoria un kernel?</h2>
  <div style="font-family:var(--mono); font-size:.85rem; color:var(--text-dim);">
    <i class="fa-solid fa-keyboard"></i> usá <span class="accent">← →</span> o hacé click en las flechas para navegar
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 1 · REPASO + AGENDA ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">repaso + agenda</div>
  <h1 class="title">Procesos que <span class="accent">se sincronizan</span>... ¿y dónde viven los datos?</h1>
  <div class="panel">
    <ul class="checklist">
      <li>Tu kernel ya crea procesos, los planifica y evita condiciones de carrera.</li>
      <li>Pero hasta ahora todo vive en arreglos de tamaño fijo. Hoy: memoria dinámica de verdad.</li>
    </ul>
  </div>
  <div class="grid-cards" style="margin-top:18px;">
    <div class="card-min">
      <i class="fa-solid fa-memory"></i>
      <h4 class="accent-cyan">Módulo 1 · 18:15–19:35</h4>
      <p>Memoria real vs. virtual, direcciones físicas/lógicas, paginación y segmentación. <b>Teoría.</b></p>
    </div>
    <div class="card-min">
      <i class="fa-solid fa-layer-group"></i>
      <h4 class="accent-amber">Módulo 2 · 19:45–21:00</h4>
      <p>Mapear el heap del kernel y escribir un allocator básico (bump allocator). <b>Práctica.</b></p>
    </div>
    <div class="card-min">
      <i class="fa-solid fa-arrows-left-right-to-line"></i>
      <h4 class="accent-amber">Módulo 3 · 21:05–22:30</h4>
      <p>Un allocator con free-list real: kmalloc() y kfree() que reutilizan memoria. <b>Práctica + quiz.</b></p>
    </div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 2 · MEMORIA REAL VS VIRTUAL ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">memoria real vs. virtual</div>
  <h1 class="title">Direcciones <span class="accent">físicas</span> vs. <span class="accent-amber">lógicas</span></h1>
  <div class="panel">
    <p style="font-size:1.05rem; line-height:1.7;">
      La <b>memoria real (física)</b> es la RAM que existe de verdad en el hardware. La <b>memoria virtual</b>
      es una capa de direcciones que cada proceso "cree" tener para sí, traducida por el hardware
      (la MMU) a direcciones físicas reales. Nuestro kernel de juguete, por ahora, <b>trabaja directo sobre
      memoria física</b> — la virtual queda como extensión posible.
    </p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-microchip"></i><h4>Espacio físico</h4><p>Direcciones reales de la RAM instalada</p></div>
    <div class="card-min"><i class="fa-solid fa-eye"></i><h4>Espacio lógico</h4><p>Lo que cada proceso "ve" — puede no coincidir con lo físico</p></div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 3 · MAPA DE MEMORIA DEL KERNEL ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">nuestro kernel, hoy</div>
  <h1 class="title">El <span class="accent">mapa de memoria</span> de tu SO de juguete</h1>
  <div class="panel">
    <div class="memmap">
      <div style="background:var(--red); flex:0.5;">BIOS/IVT</div>
      <div style="background:var(--amber); flex:1;">boot.bin</div>
      <div style="background:var(--cyan); flex:2;">kernel.bin (código)</div>
      <div style="background:var(--coral); flex:3;">heap del kernel</div>
      <div style="background:var(--green); flex:1;">video (0xb8000)</div>
    </div>
    <p style="color:var(--text-dim); font-family:var(--mono); font-size:.78rem; margin-top:10px;">
      0x00000 ──────────────────────────────────────────────────── 0xFFFFF
    </p>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">idea clave</div>
    <p style="margin:0;">Todo lo que quede <b>después</b> del kernel cargado en memoria es "tierra de nadie" — nuestro heap. Ahí es donde va a vivir nuestro allocator.</p>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 4 · PAGINACION Y SEGMENTACION ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">para el equipo que quiera ir más lejos</div>
  <h1 class="title">Paginación y <span class="accent">segmentación</span></h1>
  <div class="row g-3">
    <div class="col-md-6">
      <div class="panel h-100">
        <div class="term-tag">segmentación</div>
        <p>Divide la memoria en bloques de <b>tamaño variable</b> según la función (código, datos, pila). Ya la usamos, sin saberlo, con la GDT de la Clase 4.</p>
      </div>
    </div>
    <div class="col-md-6">
      <div class="panel h-100">
        <div class="term-tag">paginación</div>
        <p>Divide la memoria en bloques de <b>tamaño fijo</b> (páginas, típicamente 4 KB), traducidos por una tabla de páginas. Es la base de la memoria virtual moderna.</p>
      </div>
    </div>
  </div>
  <div class="panel" style="margin-top:16px; border-color:var(--amber);">
    <div class="term-tag" style="border-color:var(--amber); color:var(--amber);">alcance de hoy</div>
    <p style="margin:0;">Hoy trabajamos <b>sin paginación</b> — nuestro allocator reserva memoria física directamente. Implementar un tabla de páginas completa queda como extensión avanzada del obligatorio.</p>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 5 · QUIZ MODULO 1 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">
  <div class="eyebrow" style="justify-content:center;">check de salida · módulo 1</div>
  <h1 class="title"><i class="fa-solid fa-memory accent"></i> Antes de programar el allocator...</h1>
  <p class="subtitle">Repasemos memoria física/virtual y el mapa del kernel</p>
  <button class="btn-quiz" onclick="quizModulo1()"><i class="fa-solid fa-play"></i> Iniciar repaso</button>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 6 · TRANSICIÓN MÓDULO 2 ---------- */
addSlide(`
<div class="mod-hero animate__animated animate__fadeIn">
  <div class="mod-num accent-amber">02</div>
  <div class="eyebrow">módulo 2 · práctica</div>
  <h1 class="mega" style="font-size:2.8rem;">Un <span class="kernel" style="color:var(--amber);">Bump Allocator</span></h1>
  <h2 class="subtitle">La forma más simple posible de repartir memoria</h2>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 7 · POR QUE NO HAY MALLOC ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">el problema</div>
  <h1 class="title">No hay <span class="accent-amber">malloc()</span> — hay que escribirlo</h1>
  <div class="panel">
    <p><code>malloc</code> es parte de la librería estándar de C, que no tenemos en nuestro kernel freestanding.
    Necesitamos nuestra propia función que reserve memoria: la llamamos <code>kmalloc()</code>
    ("k" de kernel).</p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-1"></i><h4>Bump allocator</h4><p>Solo avanza un puntero — nunca libera memoria (hoy)</p></div>
    <div class="card-min"><i class="fa-solid fa-2"></i><h4>Free-list allocator</h4><p>Permite liberar y reutilizar bloques (módulo 3)</p></div>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 8 · CODIGO BUMP ALLOCATOR ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · kmalloc.c</div>
  <h1 class="title">Nuestro primer <span class="accent-amber">kmalloc()</span></h1>
  <div class="panel">
    <p>La idea: un puntero que arranca al final del kernel y solo <b>avanza</b> cada vez que alguien pide memoria. Simple, rápido, pero nunca libera nada.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// kmalloc.c</span>
<span class="c-dim">// _kernel_end la define el linker script — justo después del binario del kernel</span>
<span class="c-coral">extern unsigned char</span> _kernel_end;

<span class="c-coral">unsigned char</span> *heap_actual = &_kernel_end;

<span class="c-coral">void</span>* kmalloc(<span class="c-coral">unsigned int</span> tamano) {
    <span class="c-coral">void</span> *bloque = (<span class="c-coral">void</span>*) heap_actual;
    heap_actual += tamano;
    <span class="c-coral">return</span> bloque;
}
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 9 · USANDO KMALLOC ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · aplicándolo</div>
  <h1 class="title">Usar <span class="accent-amber">kmalloc()</span> en el kernel</h1>
  <div class="code-block">
<span class="c-dim">// ahora los procesos pueden reservar su PCB dinámicamente</span>
proceso_t *crear_proceso_dinamico(<span class="c-coral">void</span> (*funcion)(<span class="c-coral">void</span>)) {
    proceso_t *p = (proceso_t*) kmalloc(<span class="c-amber">sizeof</span>(proceso_t));
    p->estado = LISTO;
    p->ctx.esp = (<span class="c-coral">unsigned int</span>)(kmalloc(<span class="c-amber">4096</span>) + <span class="c-amber">4096</span>);
    <span class="c-coral">return</span> p;
}
  </div>
  <div class="panel" style="margin-top:16px; border-color:var(--red);">
    <div class="term-tag" style="border-color:var(--red); color:var(--red);">límite de hoy</div>
    <p style="margin:0;">Si un proceso "termina" y liberamos su memoria... no vuelve. El bump allocator solo crece. Por eso el módulo 3 agrega la posibilidad de liberar.</p>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 10 · QUIZ MODULO 2 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">

/* ---------- SLIDE 12 · FREE LIST CONCEPTO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">la idea</div>
  <h1 class="title">Cada bloque, con su <span class="accent">"etiqueta"</span></h1>
  <div class="panel">
    <p>Cada bloque de memoria reservado guarda, justo antes de los datos, un pequeño encabezado con su tamaño y si está libre u ocupado. Al liberar, marcamos el bloque como libre en vez de perderlo para siempre.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// bloque_t.c</span>
<span class="c-coral">typedef struct</span> bloque {
    <span class="c-coral">unsigned int</span> tamano;
    <span class="c-coral">int</span> libre;
    <span class="c-coral">struct</span> bloque *siguiente;
} bloque_t;

bloque_t *lista_bloques = <span class="c-amber">0</span>;   <span class="c-dim">// 0 = NULL, sin punteros nulos "de librería"</span>
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ---------- SLIDE 13 · KMALLOC Y KFREE CON FREE-LIST ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · versión 2</div>
  <h1 class="title"><span class="accent">kmalloc()</span> reutilizando bloques</h1>
  <div class="code-block">
<span class="c-coral">void</span>* kmalloc(<span class="c-coral">unsigned int</span> tamano) {
    bloque_t *actual = lista_bloques;

    <span class="c-dim">// 1. buscar un bloque libre que alcance</span>
    <span class="c-coral">while</span> (actual != <span class="c-amber">0</span>) {
        <span class="c-coral">if</span> (actual->libre && actual->tamano >= tamano) {
            actual->libre = <span class="c-amber">0</span>;
            <span class="c-coral">return</span> (<span class="c-coral">void</span>*)(actual + <span class="c-amber">1</span>);  <span class="c-dim">// datos después del encabezado</span>
        }
        actual = actual->siguiente;
    }

    <span class="c-dim">// 2. si no hay ninguno, pedir memoria nueva (como el bump allocator)</span>
    bloque_t *nuevo = (bloque_t*) heap_actual;
    heap_actual += <span class="c-amber">sizeof</span>(bloque_t) + tamano;
    nuevo->tamano = tamano;
    nuevo->libre = <span class="c-amber">0</span>;
    nuevo->siguiente = lista_bloques;
    lista_bloques = nuevo;

    <span class="c-coral">return</span> (<span class="c-coral">void</span>*)(nuevo + <span class="c-amber">1</span>);
}

<span class="c-coral">void</span> kfree(<span class="c-coral">void</span> *ptr) {
    bloque_t *b = ((bloque_t*)ptr) - <span class="c-amber">1</span>;
    b->libre = <span class="c-amber">1</span>;
}
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ============================================================
   MOTOR DE NAVEGACIÓN
   ============================================================ */
let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{
    d.classList.toggle('on', i===current);
  });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';

  const s = slides[current];
  const badge = document.getElementById('module-badge');
  badge.textContent = 'MÓDULO ' + s.module + ' · ' + (s.mtype === 'teoria' ? 'TEORÍA' : 'PRÁCTICA');
  badge.className = s.mtype === 'teoria' ? 'mod-teoria' : 'mod-practica';
  document.getElementById('clockLabel').textContent = s.clock;

  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}

function goTo(i){
  if(i<0 || i>=slides.length) return;
  current = i;
  render();
}
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
render();

/* ============================================================

const swalBase = {
  background: 'var(--bg-1)',
  color: 'var(--text)',
  customClass: { popup: 'so-popup', title: 'so-title' },
  confirmButtonColor: '#ff7d59',
  cancelButtonColor: '#6d7c8c',
};

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({
    ...swalBase,
    title,
    html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`,
    input: 'radio',
    inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])),
    inputValidator: (v)=> !v && '¡Elegí una opción!',
    confirmButtonText: 'Responder',
  });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({
    ...swalBase,
    icon: correct ? 'success' : 'error',
    title: correct ? '¡Correcto!' : 'No exactamente...',
    html: `<p style="color:var(--text-dim);">${explain}</p>`,
    confirmButtonText: 'Seguir',
  });
  return correct;
}

async function quizModulo1(){
  await askMC(
    'Memoria física vs. lógica',
    '¿Qué traduce las direcciones lógicas de un proceso a direcciones físicas reales?',
    ['El compilador','La MMU (Memory Management Unit)','El scheduler','El linker'], 1,
    'La <b>MMU</b> es el hardware que traduce direcciones lógicas (virtuales) a direcciones físicas reales de la RAM.'
  );
  await askMC(
    'Nuestro kernel hoy',
    '¿Nuestro kernel de juguete usa memoria virtual con paginación?',
    ['Sí, ya la implementamos en la Clase 4','No todavía — trabajamos directo sobre memoria física','Sí, mediante VirtualBox','No es posible en ningún kernel'], 1,
    'Por ahora trabajamos <b>directo sobre memoria física</b>; la paginación queda como extensión avanzada opcional.'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 1 completo', text:'Ahora sí, a escribir el primer allocator.'});
}

async function quizModulo2(){
  await askMC(
    'Bump allocator',
    '¿Qué hace un bump allocator cuando le pedís memoria?',
    ['Busca un bloque libre para reutilizar','Avanza un puntero y devuelve la dirección anterior','Le pregunta al usuario cuánta memoria dar','Reinicia el kernel'], 1,
    'Un bump allocator simplemente <b>avanza</b> un puntero (el "heap actual") y entrega la posición anterior — no reutiliza nada.'
  );
  await askMC(
    'Limitación',
    '¿Cuál es la principal limitación del bump allocator que vimos?',
    ['Es muy lento','Nunca libera memoria, aunque el proceso termine','No compila en C','Solo funciona en Windows'], 1,
    'El bump allocator <b>nunca libera</b> memoria — solo crece. Por eso el módulo 3 agrega una free-list para poder reutilizar bloques.'
  );
  Swal.fire({...swalBase, icon:'success', title:'Módulo 2 completo', text:'Ahora, un allocator que sí libera memoria.'});
}
