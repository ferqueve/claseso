let current=0;const deck=document.getElementById('deck'),dotsWrap=document.getElementById('dotsWrap');

function initSound(){ if(!audioCtx){ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); } soundOn=true; beep(520,.05); document.getElementById('soundBtn').innerHTML='<i class="fa-solid fa-volume-high"></i>'; }
function beep(freq=440,dur=.04,type='square'){ if(!soundOn||!audioCtx)return; const o=audioCtx.createOscillator(),g=audioCtx.createGain(); o.type=type;o.frequency.value=freq;g.gain.value=.025;o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur); }
function addSlide(html,opts={}){slides.push({html,module:opts.module||1,mtype:opts.mtype||'teoria',clock:opts.clock||''})}
function mount(){slides.forEach((s,i)=>{const div=document.createElement('div');div.className='slide'+(i===0?' active':'');div.id='slide-'+i;div.innerHTML=s.html;deck.appendChild(div);const d=document.createElement('span');d.className='dotnav'+(i===0?' on':'');d.onclick=()=>goTo(i);dotsWrap.appendChild(d)});document.getElementById('counterTotal').textContent=slides.length;render();}
function render(){document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active',i===current));document.querySelectorAll('.dotnav').forEach((d,i)=>d.classList.toggle('on',i===current));document.getElementById('counterNow').textContent=current+1;document.getElementById('progressFill').style.width=((current+1)/slides.length*100)+'%';const s=slides[current],badge=document.getElementById('module-badge');badge.textContent='MÓDULO '+s.module+' · '+(s.mtype==='teoria'?'TEORÍA':'PRÁCTICA');badge.className=s.mtype==='teoria'?'mod-teoria':'mod-practica';document.getElementById('clockLabel').textContent=s.clock}
function goTo(i){if(i<0||i>=slides.length)return;current=i;beep(330+(i%5)*40,.035);render()}
document.getElementById('nextBtn').onclick=()=>goTo(current+1);document.getElementById('prevBtn').onclick=()=>goTo(current-1);document.getElementById('soundBtn').onclick=initSound;
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key==='PageDown')goTo(current+1);if(e.key==='ArrowLeft'||e.key==='PageUp')goTo(current-1);if(e.key.toLowerCase()==='s')initSound();});
function okAlert(title,text){beep(880,.08,'sine');Swal.fire({icon:'success',title,html:text,confirmButtonText:'Continuar'});}function warnAlert(title,text){beep(180,.12,'sawtooth');Swal.fire({icon:'warning',title,html:text,confirmButtonText:'Entendido'});}function quiz(q,ok,why){Swal.fire({title:'Checkpoint',html:q,showDenyButton:true,showCancelButton:true,confirmButtonText:'A',denyButtonText:'B',cancelButtonText:'C'}).then(r=>{const ans=r.isConfirmed?'A':r.isDenied?'B':r.isDismissed?'C':''; if(ans===ok) okAlert('Correcto',why); else warnAlert('Revisemos',why);});}

<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">cola de eventos</div><h1 class="title">Proteger cola en un kernel educativo</h1><div class="panel warn"><p>Como la cola puede tocarse desde interrupción, un semáforo clásico no alcanza dentro del handler. Para esta versión simple, la operación crítica puede hacerse deshabilitando interrupciones por muy poco tiempo.</p></div><div class="code-block mt-3" style="font-size:.8rem">static void cli(void) { __asm__ volatile("cli"); }
static void sti(void) { __asm__ volatile("sti"); }

int evento_desencolar_seguro(evento_t *e)
{
    int ok;

    cli();
    ok = evento_desencolar(e);
    sti();

    return ok;
}</div><div class="panel mt-3"><p class="mb-0">No es una solución universal. Es una simplificación razonable para mostrar atomicidad en ArSaMoOS.</p></div></div>`,{module:2,mtype:'practica',clock:'19:40 – 21:00'});
