const slides=[];function addSlide(html,opts={}){slides.push({html,module:opts.module||1,mtype:opts.mtype||'teoria',clock:opts.clock||''})}
addSlide(`
<div class="cover animate__animated animate__fadeIn"><div class="boot-lines"><div>[ <span class="ok">OK</span> ] Detectando segundo disco ............... data.img</div><div>[ <span class="ok">OK</span> ] Cambiando backend de bloques ........ RAM → ATA PIO</div><div>[ <span class="ok">OK</span> ] Probando persistencia ................ reinicio seguro</div></div><div class="eyebrow">boot sequence · clase_13</div><h1 class="mega">Disco real<br><span class="kernel">/ persistencia</span></h1><h2 class="subtitle" style="margin-top:1rem;">Del disco simulado en RAM a sectores que sobreviven al reinicio</h2><div style="font-family:var(--mono);font-size:.85rem;color:var(--text-dim);"><i class="fa-solid fa-keyboard"></i> usá <span class="accent">← →</span> para navegar</div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:35'});

addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">problema real</div><h1 class="title">Nuestro disco RAM <span class="accent">funciona</span>, pero no recuerda</h1><div class="panel"><ul class="checklist"><li>Hoy el sistema de archivos vive dentro de <code>disco_ram[NUM_BLOQUES][TAM_BLOQUE]</code>.</li><li>Sirve para aprender inodos, bitmap y bloques, pero al reiniciar la VM desaparece todo.</li><li>La meta: conservar la misma API del sistema de archivos y cambiar solamente el backend de bloques.</li></ul></div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:35'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">arquitectura</div><h1 class="title">Separar <span class="accent">sistema de archivos</span> de <span class="accent-amber">driver</span></h1><div class="grid-cards"><div class="card-min"><i class="fa-solid fa-file-lines"></i><h4>FS</h4><p>crear, escribir, leer, listar. No debería saber si abajo hay RAM o disco.</p></div><div class="card-min"><i class="fa-solid fa-cubes"></i><h4>Bloques</h4><p><code>bloque_leer(n, buf)</code> y <code>bloque_escribir(n, buf)</code>.</p></div><div class="card-min"><i class="fa-solid fa-hard-drive"></i><h4>Driver</h4><p>Traduce bloque lógico a sector físico mediante puertos ATA.</p></div></div><div class="panel" style="margin-top:16px"><div class="term-tag">idea clave</div><p style="margin:0">El FS queda casi igual. La persistencia aparece cuando esos bloques dejan de estar en RAM y pasan a un archivo de disco conectado a QEMU.</p></div></div>`,{module:1,mtype:'teoria',clock:'18:15 – 19:35'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">QEMU</div><h1 class="title">Agregar un disco de datos <span class="accent">real</span></h1><div class="panel"><p>Para no mezclar el disco de arranque con los datos del sistema de archivos, usamos un segundo disco crudo. QEMU lo expone como un dispositivo IDE adicional.</p></div><div class="code-block" style="margin-top:16px;"># crear un disco de 16 MB para datos
qemu-img create -f raw data.img 16M

# arrancar con el disco del SO + disco de datos
qemu-system-i386 \
  -drive file=os.img,format=raw,index=0,media=disk \
  -drive file=data.img,format=raw,index=1,media=disk</div><div class="panel" style="margin-top:16px;border-color:var(--amber)"><div class="term-tag" style="border-color:var(--amber);color:var(--amber)">persistencia</div><p style="margin:0">Si escribís un archivo, apagás QEMU y volvés a arrancar con el mismo <code>data.img</code>, los sectores siguen ahí.</p></div></div>`,{module:1,mtype:'practica',clock:'18:15 – 19:35'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">ATA PIO · alcance didáctico</div><h1 class="title">La versión simple: <span class="accent">PIO + polling</span></h1><div class="panel"><p>No vamos a implementar AHCI, NVMe, DMA ni interrupciones de disco. Para el curso alcanza un driver ATA PIO mínimo: el CPU manda un comando, espera al estado del disco y transfiere 256 palabras de 16 bits por sector.</p></div><div class="grid-cards" style="margin-top:16px"><div class="card-min"><i class="fa-solid fa-plug"></i><h4>Puerto base</h4><p>Bus IDE primario: <code>0x1F0</code> a <code>0x1F7</code>.</p></div><div class="card-min"><i class="fa-solid fa-layer-group"></i><h4>Sector</h4><p>Trabajamos con sectores de 512 bytes, igual que <code>TAM_BLOQUE</code>.</p></div><div class="card-min"><i class="fa-solid fa-hourglass-half"></i><h4>Esperar</h4><p>Miramos <code>BSY</code> y <code>DRQ</code> en el registro de estado.</p></div></div></div>`,{module:2,mtype:'teoria',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">puertos ATA</div><h1 class="title">Mapa mínimo de registros</h1><div class="code-block">#define ATA_DATOS       0x1F0
#define ATA_SECCOUNT    0x1F2
#define ATA_LBA0        0x1F3
#define ATA_LBA1        0x1F4
#define ATA_LBA2        0x1F5
#define ATA_DRIVE       0x1F6
#define ATA_CMD_STATUS  0x1F7

#define ATA_CMD_LEER    0x20
#define ATA_CMD_ESCRIBIR 0x30
#define ATA_SR_BSY      0x80
#define ATA_SR_DRQ      0x08</div><div class="panel" style="margin-top:16px"><p style="margin:0">LBA28 permite direccionar sectores por número. Para nuestro disco de juguete sobra ampliamente.</p></div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">código base · sin includes</div><h1 class="title">Esperar a que el disco esté listo</h1><div class="code-block">typedef unsigned char  u8;
typedef unsigned short u16;
typedef unsigned int   u32;

static void ata_esperar_listo(void) {
    u8 estado;
    do { estado = inb(ATA_CMD_STATUS); }
    while (estado & ATA_SR_BSY);

    do { estado = inb(ATA_CMD_STATUS); }
    while (!(estado & ATA_SR_DRQ));
}

static void ata_delay_400ns(void) {
    inb(ATA_CMD_STATUS); inb(ATA_CMD_STATUS);
    inb(ATA_CMD_STATUS); inb(ATA_CMD_STATUS);
}</div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">lectura de sector</div><h1 class="title">Leer 512 bytes desde <span class="accent">data.img</span></h1><div class="code-block" style="font-size:.82rem">int ata_leer_sector(u32 lba, u8 *buffer) {
    outb(ATA_DRIVE, 0xF0 | ((lba >> 24) & 0x0F));  // slave: segundo disco
    ata_delay_400ns();
    outb(ATA_SECCOUNT, 1);
    outb(ATA_LBA0, (u8)(lba));
    outb(ATA_LBA1, (u8)(lba >> 8));
    outb(ATA_LBA2, (u8)(lba >> 16));
    outb(ATA_CMD_STATUS, ATA_CMD_LEER);
    ata_esperar_listo();

    for (int i = 0; i < 256; i++) {
        u16 palabra = inw(ATA_DATOS);
        buffer[i*2]     = (u8)(palabra & 0xFF);
        buffer[i*2 + 1] = (u8)(palabra >> 8);
    }
    return 0;
}</div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">escritura de sector</div><h1 class="title">Escribir un bloque persistente</h1><div class="code-block" style="font-size:.82rem">int ata_escribir_sector(u32 lba, const u8 *buffer) {
    outb(ATA_DRIVE, 0xF0 | ((lba >> 24) & 0x0F));
    ata_delay_400ns();
    outb(ATA_SECCOUNT, 1);
    outb(ATA_LBA0, (u8)(lba));
    outb(ATA_LBA1, (u8)(lba >> 8));
    outb(ATA_LBA2, (u8)(lba >> 16));
    outb(ATA_CMD_STATUS, ATA_CMD_ESCRIBIR);
    ata_esperar_listo();

    for (int i = 0; i < 256; i++) {
        u16 palabra = buffer[i*2] | ((u16)buffer[i*2 + 1] << 8);
        outw(ATA_DATOS, palabra);
    }
    outb(ATA_CMD_STATUS, 0xE7); // flush cache
    return 0;
}</div><div class="panel" style="margin-top:16px;border-color:var(--red)"><div class="term-tag" style="border-color:var(--red);color:var(--red)">cuidado</div><p style="margin:0">Escribir en el LBA equivocado pisa bytes reales del disco. Por eso usamos <code>data.img</code> aparte, nunca el disco de arranque.</p></div></div>`,{module:2,mtype:'practica',clock:'19:45 – 21:00'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">adaptador de bloques</div><h1 class="title">Cambiar una sola capa</h1><div class="code-block">#define SECTOR_INICIO_FS  0
#define TAM_BLOQUE        512

int bloque_leer(int bloque, unsigned char *destino) {
    return ata_leer_sector(SECTOR_INICIO_FS + bloque, destino);
}

int bloque_escribir(int bloque, const unsigned char *origen) {
    return ata_escribir_sector(SECTOR_INICIO_FS + bloque, origen);
}</div><div class="panel" style="margin-top:16px"><p style="margin:0">El resto del sistema de archivos debería llamar a <code>bloque_leer</code> y <code>bloque_escribir</code>, no tocar directamente <code>disco_ram</code>.</p></div></div>`,{module:3,mtype:'practica',clock:'21:05 – 22:30'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">montaje</div><h1 class="title">¿Formatear o montar?</h1><div class="grid-cards"><div class="card-min"><i class="fa-solid fa-magic-wand-sparkles"></i><h4>Formatear</h4><p>Inicializa superbloque, bitmap, tabla de inodos y directorio raíz.</p></div><div class="card-min"><i class="fa-solid fa-box-open"></i><h4>Montar</h4><p>Lee esas estructuras desde disco. No las borra.</p></div><div class="card-min"><i class="fa-solid fa-signature"></i><h4>Magic number</h4><p>Permite saber si el disco ya tiene nuestro FS o si está vacío.</p></div></div><div class="code-block" style="margin-top:16px">#define FS_MAGIC 0x544F5953  // 'TOYS'

void fs_iniciar(void) {
    bloque_leer(0, buffer_superbloque);
    if (((SuperBloque*)buffer_superbloque)->magic != FS_MAGIC) {
        fs_formatear();
    } else {
        fs_montar();
    }
}</div></div>`,{module:3,mtype:'practica',clock:'21:05 – 22:30'});
addSlide(`<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center;padding-top:6vh"><div class="eyebrow" style="justify-content:center">check de salida</div><h1 class="title"><i class="fa-solid fa-hard-drive accent"></i> Persistencia real</h1><p class="subtitle">Antes de cerrar: backend, sectores y montaje</p><button class="btn-quiz" onclick="quizFinal()"><i class="fa-solid fa-play"></i> Iniciar repaso</button></div>`,{module:3,mtype:'practica',clock:'21:05 – 22:30'});
addSlide(`<div class="cover animate__animated animate__fadeIn"><div class="eyebrow">fin de sesión</div><h1 class="mega">Ahora el kernel<br><span class="kernel">recuerda</span></h1><div class="panel" style="margin-top:20px;max-width:760px"><div class="term-tag">siguiente paso</div><ul class="checklist"><li>Probar crear un archivo, reiniciar QEMU y leerlo nuevamente.</li><li>Documentar qué funciones del FS todavía dependen de <code>disco_ram</code>.</li><li>La próxima presentación arma una shell mínima para usar el FS desde teclado.</li></ul></div></div>`,{module:3,mtype:'practica',clock:'21:05 – 22:30'});

let current=0;const deck=document.getElementById('deck'),dotsWrap=document.getElementById('dotsWrap');slides.forEach((s,i)=>{const div=document.createElement('div');div.className='slide'+(i===0?' active':'');div.id='slide-'+i;div.innerHTML=s.html;deck.appendChild(div);const d=document.createElement('span');d.className='dotnav'+(i===0?' on':'');d.onclick=()=>goTo(i);dotsWrap.appendChild(d)});document.getElementById('counterTotal').textContent=slides.length;function render(){document.querySelectorAll('.slide').forEach((el,i)=>el.classList.toggle('active',i===current));document.querySelectorAll('.dotnav').forEach((d,i)=>d.classList.toggle('on',i===current));document.getElementById('counterNow').textContent=current+1;document.getElementById('progressFill').style.width=((current+1)/slides.length*100)+'%';const s=slides[current],badge=document.getElementById('module-badge');badge.textContent='MÓDULO '+s.module+' · '+(s.mtype==='teoria'?'TEORÍA':'PRÁCTICA');badge.className=s.mtype==='teoria'?'mod-teoria':'mod-practica';document.getElementById('clockLabel').textContent=s.clock}function goTo(i){if(i<0||i>=slides.length)return;current=i;render()}document.getElementById('nextBtn').onclick=()=>goTo(current+1);document.getElementById('prevBtn').onclick=()=>goTo(current-1);document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(current+1);if(e.key==='ArrowLeft')goTo(current-1)});render();
const swalBase={background:'var(--bg-1)',color:'var(--text)',confirmButtonColor:'#00d1b2'};async function askMC(title,text,options,correctIndex,explain){const {value}=await Swal.fire({...swalBase,title,html:`<p style="text-align:left;color:var(--text-dim);margin-bottom:14px;">${text}</p>`,input:'radio',inputOptions:Object.fromEntries(options.map((o,i)=>[i,o])),inputValidator:v=>!v&&'¡Elegí una opción!',confirmButtonText:'Responder'});const correct=String(value)===String(correctIndex);await Swal.fire({...swalBase,icon:correct?'success':'error',title:correct?'¡Correcto!':'No exactamente...',html:`<p style="color:var(--text-dim);">${explain}</p>`,confirmButtonText:'Seguir'})}
