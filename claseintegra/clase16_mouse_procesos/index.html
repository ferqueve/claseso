<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">evento</div><h1 class="title">No compartimos “el mouse”: compartimos eventos</h1><div class="code-block">#ifndef EVENTO_H

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">cola circular</div><h1 class="title">Una cola pequeña alcanza para enseñar</h1><div class="code-block" style="font-size:.8rem">#include "evento.h"

#define MAX_EVENTOS 32

static evento_t cola[MAX_EVENTOS];
static int cabeza = 0;
static int cola_fin = 0;
static int cantidad = 0;

int evento_encolar(evento_t e)
{
    if (cantidad >= MAX_EVENTOS) return -1;
    cola[cola_fin] = e;
    cola_fin = (cola_fin + 1) % MAX_EVENTOS;
    cantidad++;
    return 0;
}

int evento_desencolar(evento_t *e)
{
    if (cantidad == 0) return 0;
    *e = cola[cabeza];
    cabeza = (cabeza + 1) % MAX_EVENTOS;
    cantidad--;
    return 1;
}</div><div class="panel mt-3"><p class="mb-0">Primero sin semáforo: queremos que vean por qué puede fallar si dos contextos tocan la cola.</p></div></div>`,{module:1,mtype:'practica',clock:'18:15 – 19:30'});

<div class="slide-inner animate__animated animate__fadeInUp"><div class="eyebrow">proceso cursor</div><h1 class="title">Un proceso consume eventos y dibuja el cursor</h1><div class="code-block" style="font-size:.8rem">static int cursor_x = 40;
static int cursor_y = 12;

static void proceso_cursor(void)
{
    evento_t e;

    while (1)
    {
        if (evento_desencolar(&e))
        {
            if (e.tipo == EVENTO_MOUSE)
            {
                cursor_x = e.x;
                cursor_y = e.y;
                /* por ahora: dibujar X en VGA texto */
            }
        }

        proceso_yield();
    }
}</div></div>`,{module:2,mtype:'practica',clock:'19:40 – 21:00'});

{
    volatile char *video = (volatile char *)0xB8000;
    int pos;

    if (x < 0 || x >= 80) return;
    if (y < 0 || y >= 25) return;

    pos = y * 80 + x;
    video[pos * 2] = c;
    video[pos * 2 + 1] = color;
}</div></div>`,{module:2,mtype:'practica',clock:'19:40 – 21:00'});
