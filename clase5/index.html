<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO · Clase 5 — Procesos, Hilos &amp; Scheduler</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f;
  --bg-1:#0d131b;
  --bg-2:#121a24;
  --panel-border:#1f2b38;
  --green:#39ff88;
  --green-dim:#1f8a52;
  --amber:#ffb454;
  --cyan:#5ccfe6;
  --teal:#2dd4bf;
  --teal-dim:#0f7a6d;
  --red:#ff5c7a;
  --text:#dbe4ea;
  --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace;
  --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{
  margin:0;
  background:
    radial-gradient(ellipse at top left, rgba(45,212,191,0.06), transparent 45%),
    radial-gradient(ellipse at bottom right, rgba(255,180,84,0.05), transparent 50%),
    var(--bg-0);
  color:var(--text);
  font-family:var(--display);
  overflow:hidden;
  height:100vh;
}
::selection{ background:var(--teal); color:#04211c; }

.crt-overlay{
  position:fixed; inset:0; pointer-events:none; z-index:500;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
  mix-blend-mode:overlay;
}

.statusbar{
  position:fixed; top:0; left:0; right:0; height:42px; z-index:200;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 18px;
  background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75));
  border-bottom:1px solid var(--panel-border);
  font-family:var(--mono); font-size:12.5px; letter-spacing:.03em;
  color:var(--text-dim);
}
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--teal); box-shadow:0 0 6px var(--teal); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#module-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid currentColor; }
.mod-teoria{ color:var(--cyan); }
.mod-practica{ color:var(--amber); }

.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--teal-dim), var(--teal)); box-shadow:0 0 8px var(--teal); transition:width .5s ease; }

.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }

.eyebrow{
  font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--teal); display:flex; align-items:center; gap:10px; margin-bottom:14px;
}
.eyebrow::before{ content:'//'; color:var(--text-dim); }

h1.title{ font-size:2.5rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.1; }
h2.subtitle{ font-size:1.1rem; font-weight:400; color:var(--text-dim); margin-bottom:1.6rem; }
.accent{ color:var(--teal); }
.accent-amber{ color:var(--amber); }
.accent-cyan{ color:var(--cyan); }
.accent-green{ color:var(--green); }
.accent-red{ color:var(--red); }

.panel{
  background:linear-gradient(180deg, var(--bg-1), var(--bg-2));
  border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative;
}
.panel::before{
  content:''; position:absolute; top:0; left:16px; right:16px; height:1px;
  background:linear-gradient(90deg, transparent, rgba(45,212,191,.4), transparent);
}
.term-tag{
  font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px;
  background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px;
}

.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12.5px; color:#1f5a52; margin-bottom:26px; line-height:1.9; }
.boot-lines .ok{ color:var(--green); }
.mega{ font-size:3.4rem; font-weight:700; line-height:1.05; margin:0; }
.mega .kernel{ color:var(--teal); }

.mod-hero{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }
.mod-num{ font-family:var(--mono); font-size:5rem; font-weight:700; opacity:.18; position:absolute; right:70px; top:90px; }

ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:9px 0 9px 30px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:1.02rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:9px; font-size:.85rem; }

.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:18px; transition:transform .2s, border-color .2s; }
.card-min:hover{ transform:translateY(-3px); border-color:var(--teal-dim); }
.card-min i{ color:var(--cyan); font-size:1.3rem; margin-bottom:8px; display:block; }
.card-min h4{ font-size:1rem; margin-bottom:4px; }
.card-min p{ font-size:.85rem; color:var(--text-dim); margin:0; }

/* state diagram */
.state-flow{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; justify-content:center; }
.state-node{
  background:var(--bg-1); border:2px solid var(--panel-border); border-radius:10px;
  padding:16px 22px; text-align:center; font-family:var(--mono); font-size:.95rem; min-width:130px;
}
.state-node.nuevo{ border-color:var(--cyan); color:var(--cyan); }
.state-node.listo{ border-color:var(--teal); color:var(--teal); }
.state-node.corriendo{ border-color:var(--green); color:var(--green); }
.state-node.bloqueado{ border-color:var(--amber); color:var(--amber); }
.state-node.terminado{ border-color:var(--red); color:var(--red); }
.state-arrow{ color:var(--text-dim); font-size:1.3rem; }

table.cmp{ width:100%; border-collapse:collapse; font-size:.9rem; }
table.cmp th{ font-family:var(--mono); text-transform:uppercase; font-size:.72rem; letter-spacing:.05em; color:var(--text-dim); border-bottom:1px solid var(--panel-border); padding:8px 10px; text-align:left; }
table.cmp td{ padding:9px 10px; border-bottom:1px solid var(--panel-border); }

.code-block{
  background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:16px 18px;
  font-family:var(--mono); font-size:.8rem; color:var(--cyan); overflow-x:auto; white-space:pre;
}
.code-block .c-green{ color:var(--green); }
.code-block .c-dim{ color:var(--text-dim); }
.code-block .c-amber{ color:var(--amber); }
.code-block .c-teal{ color:var(--teal); }
.code-block .c-red{ color:var(--red); }

.btn-quiz{
  background:transparent; border:1px solid var(--teal-dim); color:var(--teal);
  font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s;
}
.btn-quiz:hover{ background:var(--teal); color:#04211c; }

.nav-btn{
  position:fixed; top:50%; transform:translateY(-50%); z-index:150;
  width:46px; height:46px; border-radius:50%; border:1px solid var(--panel-border);
  background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:.2s; backdrop-filter:blur(3px);
}
.nav-btn:hover{ color:var(--teal); border-color:var(--teal-dim); }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }

.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--teal); box-shadow:0 0 6px var(--teal); }

.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.1rem !important; color:var(--teal) !important; }

@media (max-width: 768px){
  .mega{ font-size:1.9rem; }
  h1.title{ font-size:1.5rem; }
  .slide{ padding:24px 20px 90px 20px; }
  .mod-num{ display:none; }
  .state-flow{ flex-direction:column; }
  .state-arrow{ transform:rotate(90deg); }
}
</style>
</head>

addSlide(`

</div>

/* ---------- SLIDE 2 · QUE ES UN PROCESO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">conceptos básicos</div>
  <h1 class="title">¿Qué es un <span class="accent">proceso</span>?</h1>
  <div class="panel">
    <p style="font-size:1.05rem; line-height:1.7;">
      Un proceso es un <b>programa en ejecución</b>: no solo el código, sino también su estado en un momento dado.
      El SO necesita "recordar" todo eso para poder pausarlo y retomarlo más tarde exactamente donde quedó.
    </p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-file-code"></i><h4>Código</h4><p>Las instrucciones a ejecutar</p></div>
    <div class="card-min"><i class="fa-solid fa-database"></i><h4>Datos</h4><p>Variables globales y del heap</p></div>
    <div class="card-min"><i class="fa-solid fa-layer-group"></i><h4>Pila (stack)</h4><p>Variables locales, direcciones de retorno</p></div>
    <div class="card-min"><i class="fa-solid fa-microchip"></i><h4>Registros de CPU</h4><p>Valores exactos en el instante de pausa</p></div>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 3 · DIAGRAMA DE ESTADOS ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">diagrama de estados</div>
  <h1 class="title">La vida de un <span class="accent">proceso</span></h1>
  <div class="panel">
    <div class="state-flow">
      <div class="state-node nuevo">NUEVO</div>
      <div class="state-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="state-node listo">LISTO</div>
      <div class="state-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="state-node corriendo">CORRIENDO</div>
      <div class="state-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="state-node terminado">TERMINADO</div>
    </div>
    <div class="state-flow" style="margin-top:16px;">
      <div class="state-node corriendo" style="opacity:.5;">CORRIENDO</div>
      <div class="state-arrow"><i class="fa-solid fa-arrow-right-arrow-left"></i></div>
      <div class="state-node bloqueado">BLOQUEADO</div>
    </div>
  </div>
  <p style="color:var(--text-dim); font-family:var(--mono); font-size:.8rem; margin-top:12px;">
    CORRIENDO → LISTO cuando el scheduler le quita la CPU · CORRIENDO → BLOQUEADO cuando espera E/S
  </p>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 4 · PROCESOS VS HILOS ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">procesos vs. hilos</div>
  <h1 class="title">¿Uno o <span class="accent">varios flujos</span> de ejecución?</h1>
  <div class="panel">
    <table class="cmp">
      <tr><th>Procesos</th><th>Hilos (threads)</th></tr>
      <tr><td>Memoria aislada entre sí</td><td>Comparten la memoria del proceso dueño</td></tr>
      <tr><td>Comunicación cuesta más (IPC)</td><td>Comunicación directa, sin copiar datos</td></tr>
      <tr><td>Crear uno es más costoso</td><td>Crearlo es más liviano</td></tr>

  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">en nuestro kernel</div>
    <p style="margin:0; color:var(--text-dim);">Vamos a empezar con <b>procesos completos</b> (más simples de aislar). Los hilos quedan como extensión opcional si el equipo quiere ir más allá en el obligatorio.</p>
  </div>
</div>
`, {module:1, mtype:'teoria', clock:'18:15 – 19:35'});

/* ---------- SLIDE 5 · QUIZ MODULO 1 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">
  <div class="eyebrow" style="justify-content:center;">check de salida · módulo 1</div>
  <h1 class="title"><i class="fa-solid fa-diagram-project accent"></i> Antes de escribir el PCB...</h1>

  <div class="mod-num accent-amber">02</div>
  <div class="eyebrow">módulo 2 · práctica</div>
  <h1 class="mega" style="font-size:2.8rem;">El <span class="kernel" style="color:var(--amber);">PCB</span><br>en código C</h1>
  <h2 class="subtitle">Process Control Block: la "ficha" de cada proceso</h2>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 7 · STRUCT PROCESO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · proceso.h</div>
  <h1 class="title">Diseñar el <span class="accent-amber">PCB</span></h1>
  <div class="panel">
    <p>El PCB (Process Control Block) es la estructura donde el kernel guarda todo lo que necesita saber de un proceso para poder pausarlo y retomarlo.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// proceso.h</span>
<span class="c-teal">#define</span> MAX_PROCESOS 4

<span class="c-teal">enum</span> estado_proceso {
    NUEVO,
    LISTO,
    CORRIENDO,
    BLOQUEADO,
    TERMINADO
};

<span class="c-teal">typedef struct</span> {
    <span class="c-teal">unsigned int</span> esp;   <span class="c-dim">// stack pointer guardado</span>
} contexto_t;

<span class="c-teal">typedef struct</span> {
    <span class="c-teal">int</span> id;
    <span class="c-teal">enum</span> estado_proceso estado;
    contexto_t ctx;
    <span class="c-teal">unsigned char</span> pila[<span class="c-amber">4096</span>];  <span class="c-dim">// stack propio de 4 KB</span>
} proceso_t;
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 8 · TABLA DE PROCESOS ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · tabla de procesos</div>
  <h1 class="title">Crear y <span class="accent-amber">registrar</span> procesos</h1>
  <div class="code-block">
<span class="c-dim">// kernel.c</span>
proceso_t procesos[MAX_PROCESOS];
<span class="c-teal">int</span> num_procesos = <span class="c-amber">0</span>;

<span class="c-teal">int</span> crear_proceso(<span class="c-teal">void</span> (*funcion)(<span class="c-teal">void</span>)) {
    <span class="c-teal">if</span> (num_procesos >= MAX_PROCESOS) <span class="c-teal">return</span> -<span class="c-amber">1</span>;

    proceso_t *p = &procesos[num_procesos];
    p->id = num_procesos;
    p->estado = LISTO;

    <span class="c-dim">// apuntamos el stack pointer al tope de su propia pila</span>
    p->ctx.esp = (<span class="c-teal">unsigned int</span>)(p->pila + <span class="c-amber">4096</span>);

    num_procesos++;
    <span class="c-teal">return</span> p->id;
}
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">idea clave</div>
    <p style="margin:0;">Cada proceso tiene su <b>propia pila</b> dentro del struct. Así, cuando el scheduler cambie de proceso, cada uno sigue teniendo sus variables locales intactas.</p>
  </div>
</div>
`, {module:2, mtype:'practica', clock:'19:45 – 21:00'});

/* ---------- SLIDE 9 · QUIZ MODULO 2 ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:6vh;">
  <div class="eyebrow" style="justify-content:center;">check de salida · módulo 2</div>

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">

      y abrir el libro del otro proceso <b>exactamente donde él dejó su propio separador</b>. La CPU no sabe
      ni le importa qué proceso es cuál — simplemente sigue leyendo desde donde apunta <code>esp</code>.

/* ---------- SLIDE 10C · POR QUE NO ALCANZA CON SOLO ESP ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">un detalle que rompe el kernel si se ignora</div>
  <h1 class="title">¿Alcanza con mover <span class="accent">solo ESP</span>?</h1>
  <div class="panel" style="border-color:var(--amber);">
    <div class="term-tag" style="border-color:var(--amber); color:var(--amber);">no del todo</div>
    <p style="font-size:1.02rem; line-height:1.7;">
      Cuando el compilador genera el código de un proceso, puede usar registros como <code>EBX</code>,
      <code>ESI</code>, <code>EDI</code> o <code>EBP</code> para guardar variables locales — son los llamados
      <b>registros "callee-saved"</b>: el código que llama a una función asume que van a seguir teniendo el
      mismo valor cuando esa función vuelve. Si al cambiar de proceso solo movemos <code>esp</code> y no
      esos registros, el proceso que entra se encuentra con <b>la "letra" del proceso anterior</b> escrita en
      sus propios registros — un bug real, silencioso y muy difícil de detectar a simple vista.
    </p>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">la solución: pushad / popad</div>
    <p style="margin:0;">Antes de cambiar <code>esp</code>, guardamos TODOS los registros de propósito general del proceso saliente en su propia pila (<code>pushad</code>). Después de cambiar <code>esp</code>, restauramos los del proceso entrante desde la suya (<code>popad</code>). Así cada proceso retoma exactamente como lo dejó.</p>
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ---------- SLIDE 11 · CAMBIO DE CONTEXTO ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · cambio de contexto</div>
  <h1 class="title">Guardar y <span class="accent">restaurar</span> la ejecución, en código</h1>
  <div class="panel">
    <p>La versión robusta se escribe en <b>ensamblador puro</b>, no como <code>asm</code> dentro de una función de C. ¿Por qué? Porque el propio epílogo que GCC genera para toda función de C (que restaura <code>esp</code> a partir de <code>ebp</code> antes de retornar) deshace nuestro cambio manual apenas termina el bloque de <code>asm</code>. Escribirla aparte evita ese conflicto.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">; switch.asm
; void cambiar_contexto(contexto_t *viejo, contexto_t *nuevo);
; contexto_t es { unsigned int esp; }</span>

[bits 32]
global cambiar_contexto

cambiar_contexto:
    mov eax, [esp+4]      <span class="c-dim">; argumento 1: puntero a contexto viejo</span>
    mov edx, [esp+8]      <span class="c-dim">; argumento 2: puntero a contexto nuevo</span>

    pushad                 <span class="c-dim">; 1. guardar TODOS los registros del proceso saliente</span>
    mov [eax], esp         <span class="c-dim">;    y anotar dónde quedó su pila (justo después de pushad)</span>

    mov esp, [edx]         <span class="c-dim">; 2. saltar a la pila del proceso entrante...</span>
    popad                  <span class="c-dim">; 3. ...y restaurar SUS registros desde ahí</span>
    ret                     <span class="c-dim">; 4. "retornar" a la dirección que esa pila tenía guardada</span>
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ---------- SLIDE 11B · AJUSTAR LA PILA INICIAL ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">atando cabos con crear_proceso()</div>
  <h1 class="title">La <span class="accent">primera vez</span> que un proceso corre</h1>
  <div class="panel">
    <p>Hay un detalle importante: <code>popad</code> va a sacar 8 valores de la pila del proceso entrante, y <code>ret</code> va a saltar a lo que encuentre justo después. La <b>primera vez</b> que un proceso recibe la CPU, su pila todavía no pasó por ningún <code>pushad</code> real — así que tenemos que <b>simular uno a mano</b> al crearlo.</p>
  </div>
  <div class="code-block" style="margin-top:16px;">
<span class="c-dim">// dentro de crear_proceso(), construyendo la pila "de arriba hacia abajo":</span>
<span class="c-teal">unsigned int</span> *tope = (<span class="c-teal">unsigned int</span>*)(p->pila + TAM_PILA);

*(--tope) = (<span class="c-teal">unsigned int</span>) funcion; <span class="c-dim">// dirección de retorno — la consume "ret"</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// EAX (dummy)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// ECX (dummy)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// EDX (dummy)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// EBX (dummy)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// ESP original (popad lo descarta sin usarlo)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// EBP (dummy)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// ESI (dummy)</span>
*(--tope) = <span class="c-amber">0</span>; <span class="c-dim">// EDI (dummy) — queda como el nuevo tope</span>

p->ctx.esp = (<span class="c-teal">unsigned int</span>) tope;
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">por qué en ese orden</div>
    <p style="margin:0;">El orden imita exactamente lo que un <code>pushad</code> real dejaría en la pila. Así, la primera vez que <code>cambiar_contexto</code> haga <code>popad</code> sobre este proceso, encuentra "registros" válidos (aunque sean ceros) y el <code>ret</code> final salta directo a <code>funcion</code> — el punto de entrada del proceso.</p>
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">antes del código: la idea</div>
  <h1 class="title">¿Qué es <span class="accent">Round-Robin</span>?</h1>
  <div class="panel">
    <p style="font-size:1.02rem; line-height:1.7;">
      Round-robin es el algoritmo de planificación más simple que existe: <b>todos los procesos LISTOS
      forman una fila circular</b>, y cada uno recibe un turno de CPU por igual, en orden, sin importar
      qué tan importante sea. Cuando le toca a un proceso, corre un rato; cuando cede la CPU (o se le
      acaba su turno), pasa al final de la fila y le toca al siguiente.
    </p>
  </div>
  <div class="grid-cards" style="margin-top:16px;">
    <div class="card-min"><i class="fa-solid fa-circle-notch"></i><h4>Cola circular</h4><p>Después del último proceso, se vuelve al primero</p></div>
    <div class="card-min"><i class="fa-solid fa-scale-balanced"></i><h4>Sin prioridades</h4><p>Todos los procesos LISTOS valen lo mismo</p></div>
    <div class="card-min"><i class="fa-solid fa-forward-step"></i><h4>Salta los BLOQUEADOS</h4><p>Si un proceso no está LISTO, se lo saltea y sigue buscando</p></div>
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">en nuestro kernel</div>
    <p style="margin:0;">"Buscar al siguiente" significa: arrancar desde el proceso siguiente al actual, e ir avanzando en círculo (con el operador <code>%</code>) hasta encontrar uno en estado <code>LISTO</code>.</p>
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ---------- SLIDE 12 · SCHEDULER ROUND ROBIN ---------- */
addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">laboratorio · planificador</div>
  <h1 class="title">Round-Robin, <span class="accent">paso a paso en código</span></h1>
  <div class="code-block">
<span class="c-dim">// scheduler.c</span>
<span class="c-teal">int</span> proceso_actual = <span class="c-amber">0</span>;

<span class="c-teal">void</span> planificador(<span class="c-teal">void</span>) {
    <span class="c-teal">if</span> (num_procesos == <span class="c-amber">0</span>) <span class="c-teal">return</span>;  <span class="c-dim">// nada que planificar todavía</span>

    <span class="c-teal">int</span> anterior  = proceso_actual;
    <span class="c-teal">int</span> siguiente = (proceso_actual + <span class="c-amber">1</span>) % num_procesos; <span class="c-dim">// 1. avanzar un lugar en la cola circular</span>

    <span class="c-dim">// 2. seguir avanzando hasta encontrar uno LISTO,
    //    pero sin dar la vuelta entera si nadie más lo está</span>
    <span class="c-teal">while</span> (procesos[siguiente].estado != LISTO && siguiente != anterior) {
        siguiente = (siguiente + <span class="c-amber">1</span>) % num_procesos;
    }
    <span class="c-teal">if</span> (procesos[siguiente].estado != LISTO) <span class="c-teal">return</span>; <span class="c-dim">// nadie más listo — seguimos como estábamos</span>

    <span class="c-dim">// 3. actualizar estados: el que se va vuelve a LISTO, el que entra pasa a CORRIENDO</span>
    procesos[anterior].estado  = LISTO;
    procesos[siguiente].estado = CORRIENDO;
    proceso_actual = siguiente;

    <span class="c-dim">// 4. el cambio de contexto real — acá es donde "saltamos" de un proceso a otro</span>
    cambiar_contexto(&procesos[anterior].ctx, &procesos[siguiente].ctx);
}
  </div>
  <div class="panel" style="margin-top:16px;">
    <div class="term-tag">detalle importante</div>
    <p style="margin:0;">La condición <code>siguiente != anterior</code> evita un bucle infinito: si el proceso actual es el ÚNICO en estado LISTO, no tiene sentido seguir buscando — simplemente sigue corriendo él mismo.</p>
  </div>
</div>
`, {module:3, mtype:'practica', clock:'21:05 – 22:30'});

/* ============================================================
   MOTOR DE NAVEGACIÓN
   ============================================================ */
let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);

  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{
    el.classList.toggle('active', i===current);
  });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{
    d.classList.toggle('on', i===current);
  });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';

  const s = slides[current];
  const badge = document.getElementById('module-badge');
  badge.textContent = 'MÓDULO ' + s.module + ' · ' + (s.mtype === 'teoria' ? 'TEORÍA' : 'PRÁCTICA');
  badge.className = s.mtype === 'teoria' ? 'mod-teoria' : 'mod-practica';
  document.getElementById('clockLabel').textContent = s.clock;

  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}

function goTo(i){
  if(i<0 || i>=slides.length) return;
  current = i;
  render();
}
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{
  if(e.key === 'ArrowRight') goTo(current+1);
  if(e.key === 'ArrowLeft') goTo(current-1);
});
render();

const swalBase = {
  background: 'var(--bg-1)',
  color: 'var(--text)',
  customClass: { popup: 'so-popup', title: 'so-title' },
  confirmButtonColor: '#2dd4bf',
  cancelButtonColor: '#6d7c8c',
};

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({
    ...swalBase,
    title,
    html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`,
    input: 'radio',
    inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])),
    inputValidator: (v)=> !v && '¡Elegí una opción!',
    confirmButtonText: 'Responder',
  });
  const correct = String(value) === String(correctIndex);
  await Swal.fire({
    ...swalBase,
    icon: correct ? 'success' : 'error',
    title: correct ? '¡Correcto!' : 'No exactamente...',
    html: `<p style="color:var(--text-dim);">${explain}</p>`,
    confirmButtonText: 'Seguir',
  });
  return correct;
}
