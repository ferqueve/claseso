<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SO · Checkpoint 5 — Entrada/Salida e Integración</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg-0:#070a0f; --bg-1:#0d131b; --bg-2:#121a24; --panel-border:#1f2b38;
  --green:#39ff88; --green-dim:#1f8a52; --gold:#ffd166; --gold-dim:#8a6f1f;
  --text:#dbe4ea; --text-dim:#6d7c8c;
  --mono:'JetBrains Mono', monospace; --display:'Space Grotesk', sans-serif;
}
*{box-sizing:border-box;}
html,body{height:100%;}
body{ margin:0; background: radial-gradient(ellipse at top left, rgba(255,209,102,0.06), transparent 45%), radial-gradient(ellipse at bottom right, rgba(57,255,136,0.05), transparent 50%), var(--bg-0); color:var(--text); font-family:var(--display); overflow:hidden; height:100vh; }
::selection{ background:var(--gold); color:#211a05; }
.crt-overlay{ position:fixed; inset:0; pointer-events:none; z-index:500; background:repeating-linear-gradient(to bottom, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px); mix-blend-mode:overlay; }
.statusbar{ position:fixed; top:0; left:0; right:0; height:42px; z-index:200; display:flex; align-items:center; justify-content:space-between; padding:0 18px; background:linear-gradient(180deg, rgba(13,19,27,0.95), rgba(13,19,27,0.75)); border-bottom:1px solid var(--panel-border); font-family:var(--mono); font-size:12.5px; letter-spacing:.03em; color:var(--text-dim); }
.statusbar .seg{ display:flex; align-items:center; gap:8px; }
.statusbar .dot{ width:7px; height:7px; border-radius:50%; background:var(--gold); box-shadow:0 0 6px var(--gold); animation:pulse 1.8s infinite; }
@keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
.statusbar .cursor{ display:inline-block; width:7px; background:var(--green); margin-left:2px; animation:blink 1s steps(1) infinite; }
@keyframes blink{ 50%{ opacity:0; } }
#score-badge{ font-weight:700; padding:2px 10px; border-radius:3px; border:1px solid var(--gold); color:var(--gold); }
.progress-rail{ position:fixed; top:42px; left:0; right:0; height:3px; background:var(--bg-2); z-index:200; }
.progress-fill{ height:100%; background:linear-gradient(90deg, var(--gold-dim), var(--gold)); box-shadow:0 0 8px var(--gold); transition:width .5s ease; }
.deck{ position:relative; height:100vh; width:100vw; padding-top:45px; }
.slide{ position:absolute; inset:0; top:45px; display:none; padding:38px 64px 74px 64px; overflow-y:auto; }
.slide.active{ display:block; }
.slide-inner{ max-width:1180px; margin:0 auto; }
.eyebrow{ font-family:var(--mono); font-size:12.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.eyebrow::before{ content:'//'; color:var(--text-dim); }
h1.title{ font-size:2.3rem; font-weight:700; margin:0 0 .3rem 0; line-height:1.15; }
h2.subtitle{ font-size:1.05rem; font-weight:400; color:var(--text-dim); margin-bottom:1.4rem; }
.accent{ color:var(--gold); }
.panel{ background:linear-gradient(180deg, var(--bg-1), var(--bg-2)); border:1px solid var(--panel-border); border-radius:10px; padding:22px 26px; position:relative; }
.panel::before{ content:''; position:absolute; top:0; left:16px; right:16px; height:1px; background:linear-gradient(90deg, transparent, rgba(255,209,102,.4), transparent); }
.term-tag{ font-family:var(--mono); font-size:11px; color:var(--text-dim); position:absolute; top:-10px; left:16px; background:var(--bg-0); padding:0 6px; border:1px solid var(--panel-border); border-radius:3px; }
.cover{ height:calc(100vh - 45px); display:flex; flex-direction:column; justify-content:center; }
.boot-lines{ font-family:var(--mono); font-size:12px; color:#7a6a30; margin-bottom:22px; line-height:1.85; }
.boot-lines .ok{ color:var(--green); }
.mega{ font-size:2.7rem; font-weight:700; line-height:1.1; margin:0; }
.mega .kernel{ color:var(--gold); }
ul.checklist{ list-style:none; padding:0; margin:0; }
ul.checklist li{ padding:8px 0 8px 28px; position:relative; border-bottom:1px dashed var(--panel-border); font-size:.98rem; }
ul.checklist li:last-child{ border-bottom:none; }
ul.checklist li::before{ content:'\f00c'; font-family:'Font Awesome 6 Free'; font-weight:900; color:var(--green); position:absolute; left:0; top:8px; font-size:.82rem; }
.grid-cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:14px; }
.card-min{ background:var(--bg-1); border:1px solid var(--panel-border); border-radius:8px; padding:15px; }
.card-min i{ color:var(--gold); font-size:1.15rem; margin-bottom:5px; display:block; }
.card-min h4{ font-size:.9rem; margin-bottom:3px; }
.card-min p{ font-size:.78rem; color:var(--text-dim); margin:0; }
.code-block{ background:#04070b; border:1px solid var(--panel-border); border-radius:8px; padding:14px 16px; font-family:var(--mono); font-size:.75rem; color:#5ccfe6; overflow-x:auto; white-space:pre; }
.btn-quiz{ background:transparent; border:1px solid var(--gold-dim); color:var(--gold); font-family:var(--mono); border-radius:6px; padding:10px 18px; font-size:.85rem; transition:.2s; }
.btn-quiz:hover{ background:var(--gold); color:#211a05; }
.nav-btn{ position:fixed; top:50%; transform:translateY(-50%); z-index:150; width:44px; height:44px; border-radius:50%; border:1px solid var(--panel-border); background:rgba(13,19,27,.85); color:var(--text-dim); display:flex; align-items:center; justify-content:center; cursor:pointer; }
#prevBtn{ left:16px; } #nextBtn{ right:16px; }
.slide-counter{ position:fixed; bottom:14px; right:24px; z-index:150; font-family:var(--mono); font-size:.78rem; color:var(--text-dim); }
.slide-dots{ position:fixed; bottom:14px; left:50%; transform:translateX(-50%); z-index:150; display:flex; gap:6px; }
.slide-dots span{ width:6px; height:6px; border-radius:50%; background:var(--panel-border); cursor:pointer; }
.slide-dots span.on{ background:var(--gold); box-shadow:0 0 6px var(--gold); }
.swal2-popup.so-popup{ background:var(--bg-1) !important; color:var(--text) !important; border:1px solid var(--panel-border); font-family:var(--display); }
.so-title{ font-family:var(--mono) !important; font-size:1.05rem !important; color:var(--gold) !important; }
@media (max-width: 768px){ .mega{ font-size:1.6rem; } h1.title{ font-size:1.35rem; } .slide{ padding:22px 18px 90px 18px; } }
</style>
</head>
<body>
<div class="crt-overlay"></div>
<div class="statusbar">
  <div class="seg"><span class="dot"></span> SO · CAMPUS SALTO <span class="cursor">&nbsp;</span></div>
  <div class="seg" id="score-badge">PUNTAJE: 0 / 0</div>
  <div class="seg"><i class="fa-solid fa-list-check"></i> Checkpoint 5 · Clases 10-11</div>
</div>
<div class="progress-rail"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
<div class="deck" id="deck"></div>
<div class="nav-btn" id="prevBtn"><i class="fa-solid fa-chevron-left"></i></div>
<div class="nav-btn" id="nextBtn"><i class="fa-solid fa-chevron-right"></i></div>
<div class="slide-counter"><span id="counterNow">1</span> / <span id="counterTotal">1</span></div>
<div class="slide-dots" id="dotsWrap"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script>
const slides = [];
function addSlide(html){ slides.push({html}); }


addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="boot-lines">
    <div>[ <span class="ok">OK</span> ] Cargando checkpoint .................... clases 10-11</div>
    <div>[ <span class="ok">OK</span> ] Preparando repaso obligatorio</div>
  </div>
  <div class="eyebrow">checkpoint · repaso obligatorio</div>
  <h1 class="mega">Checkpoint 5</h1>
  <h2 class="subtitle" style="margin-top:.8rem;">Entrada/Salida e Integración Final — repaso de las Clases 10 y 11</h2>
  <div class="panel" style="max-width:640px; margin-top:14px; border-color:var(--gold);">
    <div class="term-tag" style="border-color:var(--gold); color:var(--gold);">tarea obligatoria</div>
    <p style="margin:0;">Completá el repaso antes de la próxima clase y generá tu código de entrega al final.</p>
  </div>
  <div style="font-family:var(--mono); font-size:.8rem; color:var(--text-dim); margin-top:14px;">
    <i class="fa-solid fa-keyboard"></i> usá <span class="accent">← →</span> para navegar
  </div>
</div>
`);

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp">
  <div class="eyebrow">clases 10-11</div>
  <h1 class="title">Lo esencial de <span class="accent">E/S e Integración</span></h1>
  <div class="grid-cards">
    <div class="card-min"><i class="fa-solid fa-microchip"></i><h4>PIC 8259</h4><p>Remapea IRQ 0-15 a vectores 32-47; enmascarar todo salvo lo que se atiende</p></div>
<div class="card-min"><i class="fa-solid fa-table-list"></i><h4>IDT</h4><p>Le dice a la CPU qué función ejecutar para cada interrupción</p></div>
<div class="card-min"><i class="fa-solid fa-keyboard"></i><h4>Driver de teclado</h4><p>IRQ1, scancode en puerto 0x60, buffer circular</p></div>
<div class="card-min"><i class="fa-solid fa-diagram-project"></i><h4>Integración</h4><p>Los bugs reales aparecen en el cruce entre piezas, no aisladas</p></div>
  </div>
</div>
`);

addSlide(`
<div class="slide-inner animate__animated animate__fadeInUp" style="text-align:center; padding-top:8vh;">
  <div class="eyebrow" style="justify-content:center;">quiz obligatorio</div>
  <h1 class="title"><i class="fa-solid fa-brain accent"></i> Repaso rápido</h1>
  <p class="subtitle">Repasemos E/S e integración final — el cierre de todo el curso</p>
  <button class="btn-quiz" onclick="quizCheckpoint()"><i class="fa-solid fa-play"></i> Iniciar quiz</button>
</div>
`);

addSlide(`
<div class="cover animate__animated animate__fadeIn">
  <div class="eyebrow">fin del checkpoint</div>
  <h1 class="mega" style="font-size:2.2rem;">¡Checkpoint final completo!</h1>
  <div class="panel" style="margin-top:18px; max-width:640px;">
    <div class="term-tag">siguiente</div>
    <p style="margin:0;">Con esto se cierra el repaso obligatorio de todo el curso — éxitos con la defensa del obligatorio.</p>
  </div>
  <div class="panel" style="margin-top:16px; max-width:640px; border-color:var(--gold);">
    <div class="term-tag" style="border-color:var(--gold); color:var(--gold);">constancia de entrega</div>
    <p style="margin:0 0 12px 0;">Generá tu código y enviámelo por el canal del curso.</p>
    <button class="btn-quiz" onclick="generarCodigoEntrega()"><i class="fa-solid fa-stamp"></i> Generar código de entrega</button>
    <div id="codigo-entrega" style="margin-top:14px;"></div>
  </div>
</div>
`);


let current = 0;
const deck = document.getElementById('deck');
const dotsWrap = document.getElementById('dotsWrap');
let score = 0; let totalAnswered = 0;

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide' + (i === 0 ? ' active' : '');
  div.id = 'slide-' + i;
  div.innerHTML = s.html;
  deck.appendChild(div);
  const dot = document.createElement('span');
  dot.onclick = () => goTo(i);
  dotsWrap.appendChild(dot);
});
document.getElementById('counterTotal').textContent = slides.length;

function render(){
  document.querySelectorAll('.slide').forEach((el,i)=>{ el.classList.toggle('active', i===current); });
  document.querySelectorAll('#dotsWrap span').forEach((d,i)=>{ d.classList.toggle('on', i===current); });
  document.getElementById('counterNow').textContent = current+1;
  document.getElementById('progressFill').style.width = ((current+1)/slides.length*100)+'%';
  const active = document.getElementById('slide-'+current);
  const animEl = active.querySelector('.animate__animated');
  if(animEl){ animEl.style.animationDuration = '.5s'; }
}
function goTo(i){ if(i<0 || i>=slides.length) return; current = i; render(); }
document.getElementById('nextBtn').onclick = ()=>goTo(current+1);
document.getElementById('prevBtn').onclick = ()=>goTo(current-1);
document.addEventListener('keydown', (e)=>{ if(e.key === 'ArrowRight') goTo(current+1); if(e.key === 'ArrowLeft') goTo(current-1); });
render();

const swalBase = { background: 'var(--bg-1)', color: 'var(--text)', customClass: { popup: 'so-popup', title: 'so-title' }, confirmButtonColor: '#ffd166', cancelButtonColor: '#6d7c8c' };
function updateScoreBadge(){ document.getElementById('score-badge').textContent = `PUNTAJE: ${score} / ${totalAnswered}`; }

async function askMC(title, text, options, correctIndex, explain){
  const {value} = await Swal.fire({ ...swalBase, title, html: `<p style="text-align:left; color:var(--text-dim); margin-bottom:14px;">${text}</p>`, input: 'radio', inputOptions: Object.fromEntries(options.map((o,i)=>[i,o])), inputValidator: (v)=> !v && '¡Elegí una opción!', confirmButtonText: 'Responder' });
  const correct = String(value) === String(correctIndex);
  totalAnswered++; if(correct) score++; updateScoreBadge();
  await Swal.fire({ ...swalBase, icon: correct ? 'success' : 'error', title: correct ? '¡Correcto!' : 'No exactamente...', html: `<p style="color:var(--text-dim);">${explain}</p>`, confirmButtonText: 'Seguir' });
  return correct;
}

async function quizCheckpoint(){
  await askMC(
    'PIC',
    '¿Por qué hay que remapear el PIC antes de usar interrupciones?',
    ['No hace falta','Porque sus vectores por defecto chocan con excepciones de la CPU','Para que el teclado escriba mayúsculas','Para ahorrar memoria'], 1,
    'Por defecto el PIC usa vectores que la CPU ya usa para excepciones (0-31) — hay que moverlos.'
  );
  await askMC(
    'Bug real del PIC',
    '¿Por qué la primera versión de pic_remapear() causaba un triple fault?',
    ['Un simple error de tipeo en el código fuente','Que QEMU en particular no soporta bien el PIC','Un uso incorrecto del operador módulo','El timer (IRQ0) quedaba desenmascarado sin manejador instalado'], 3,
    'El timer venía desenmascarado de fábrica; sin manejador, la interrupción causó un triple fault.'
  );
  await askMC(
    'Teclado',
    '¿Qué indica el bit 7 en 1 de un scancode?',
    ['Una tecla especial','Un error de teclado','Que se soltó la tecla (break code)','Que se presionó la tecla'], 2,
    'Bit 7 en 1 = <b>break code</b> (tecla soltada) — nuestro driver los ignora.'
  );
  await askMC(
    'EOI',
    '¿Qué pasa si no se llama a pic_enviar_eoi()?',
    ['Nada, es opcional','El PIC no manda más interrupciones de ningún tipo','Se reinicia la VM','Deja de funcionar el teclado nada más'], 1,
    'Sin el End Of Interrupt, el PIC asume que la interrupción sigue en curso y no entrega ninguna otra.'
  );
  await askMC(
    'Integración',
    '¿Por qué los bugs más interesantes del curso aparecieron en el cruce entre piezas?',
    ['Porque cada pieza funciona sola, pero las interacciones son donde algo puede fallar','Puramente porque QEMU resulta ser inestable','Porque el código en general estaba mal escrito','Simplemente por pura casualidad del destino'], 0,
    'Un sistema operativo vive de sus interacciones — ahí es donde aparecen los bugs sutiles, como vimos dos veces en este curso.'
  );
  Swal.fire({...swalBase, icon:'success', title:'¡Checkpoint completo!', html:`Puntaje: <b>${score} / ${totalAnswered}</b>`});
}


async function generarCodigoEntrega(){
  const { value: nombre } = await Swal.fire({ ...swalBase, title: 'Tu nombre', input: 'text', inputPlaceholder: 'Nombre y apellido', inputValidator: (v)=> !v && 'Ingresá tu nombre para generar el código', confirmButtonText: 'Generar código' });
  if(!nombre) return;
  if(totalAnswered === 0){ Swal.fire({...swalBase, icon:'warning', title:'Todavía no respondiste nada', text:'Completá el quiz antes de generar el código.'}); return; }
  const fecha = new Date();
  const fechaStr = `${fecha.getFullYear()}${String(fecha.getMonth()+1).padStart(2,'0')}${String(fecha.getDate()).padStart(2,'0')}`;
  const iniciales = nombre.trim().split(/\s+/).map(p=>p[0].toUpperCase()).join('').slice(0,4);
  const codigo = `SO-CP5-${fechaStr}-${iniciales}-${score}${totalAnswered}`;
  document.getElementById('codigo-entrega').innerHTML = `<div class="code-block" style="text-align:center; font-size:1rem;">${codigo}</div><p style="color:var(--text-dim); font-size:.8rem; margin-top:8px;">Copiá este código y enviámelo por el canal del curso.</p>`;
}
</script>
</body>
</html>
